# Alias global Service for the OSWorld KVM cell ("cell 1.5").
# The canonical cell resources (namespace, legacy-named global Service, and the
# opensandbox-server HelmRelease) are terraform/flux-managed; renaming them
# belongs in the TF modules (queued with SRE). This alias gives the cell its
# correct name today: same selector -> same server pods, istio.io/global for
# cross-cluster reachability.
# Apply to the SANDBOX cluster.
apiVersion: v1
kind: Service
metadata:
  name: opensandbox-cell-1-5
  namespace: opensandbox-system
  labels:
    app.kubernetes.io/component: cross-cluster-global-service
    app.kubernetes.io/part-of: k8s-sandbox-platform
    app.kubernetes.io/managed-by: <YOUR_USER>-alias
    istio.io/global: "true"
spec:
  type: ClusterIP
  selector:
    # must match the cell's opensandbox-server pods (instance = its helm release name)
    app.kubernetes.io/instance: <YOUR_CELL_HELM_RELEASE>
    app.kubernetes.io/name: opensandbox-server
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
