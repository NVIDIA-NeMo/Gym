# Alias global Service for the OSWorld KVM cell ("cell 1.5") - GPU-cluster side.
# Mirror of the sandbox-cluster alias: istio.io/global + a deliberately
# non-matching selector, so traffic routes to the remote cluster's endpoints
# (same pattern as the existing terraform-managed legacy-named mirror).
# Apply to the GPU cluster.
apiVersion: v1
kind: Service
metadata:
  name: opensandbox-cell-1-5
  namespace: opensandbox-system
  labels:
    app.kubernetes.io/component: cross-cluster-global-service
    app.kubernetes.io/part-of: k8s-sandbox-platform
    app.kubernetes.io/managed-by: <YOUR_USER>-alias
    istio.io/global: "true"
spec:
  type: ClusterIP
  selector:
    sandbox.nemo-rl/cell: cell-1-5-no-local-match
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
