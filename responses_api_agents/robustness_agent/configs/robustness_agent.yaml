robustness_agent:
  responses_api_agents:
    robustness_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: ???
      model_server:
        type: responses_api_models
        name: policy_model
      # Optional: set to a model server name to enable rewriting.
      # If omitted, the agent behaves identically to simple_agent.
      rewriter_model_server:
        type: responses_api_models
        name: rewriter_model
      # Fine-grained control over what gets rewritten (all default to true).
      rewrite_prompts: true
      rewrite_tool_names: true
      rewrite_arg_names: true
