# cvdp agentic, harness-agnostic agent driving claude_code_agent inside the sim sandbox.
# claude_code speaks the anthropic api, so its endpoint and key are passed via agent_kwargs.
# swap the agent_server_* block (and setup_scripts/<key>_deps.sh) to change harness.
cvdp_agent_generic_claude:
  responses_api_agents:
    cvdp_agent:
      entrypoint: agentic_generic.py
      resources_server: {type: resources_servers, name: cvdp}
      model_server: {type: responses_api_models, name: policy_model}
      concurrency: 4
      timeout: 900

      # the harness: swap these three + setup_scripts/<key>_deps.sh to change agent
      agent_server_module: responses_api_agents.claude_code_agent.app
      agent_server_class: ClaudeCodeAgent
      agent_config_class: ClaudeCodeAgentConfig
      agent_kwargs:
        # only `model` is load-bearing when model_server is set: the runner points claude at the
        # model server, so anthropic_base_url is overridden and anthropic_api_key falls back to a
        # local token. 
        model: ${anthropic_model_name}
        max_turns: 30

      # sandbox: eda sim image, apptainer backend, deps bind-mounted
      image: ${cvdp_sim_image}
      # mount_point MUST match container_workdir: the provider bind-mounts a writable host
      # dir at mount_point, and everything the agent writes lives under container_workdir.
      # --writable-tmpfs makes the rest of the container (e.g. the harness's HOME) writable.
      sandbox_provider:
        apptainer:
          create:
            mount_point: /code
            extra_start_args: [--writable-tmpfs]
      container_workdir: /code
      deps_provision: bind
