mini_swe_agent_2:
  responses_api_agents:
    mini_swe_agent_2:
      entrypoint: app.py
      domain: coding
      description: Software engineering tasks driven by mini-swe-agent harness on OpenSandbox.
      value: Improve agentic software engineering capabilities.
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: validation
        type: validation
        jsonl_fpath: responses_api_agents/mini_swe_agent_2/data/validation.jsonl
        huggingface_identifier:
          repo_id: princeton-nlp/SWE-bench_Verified
        license: MIT
      concurrency: 64
      env: sandbox
      cache_dir_template: null
      sandbox_provider:
        name: opensandbox
        kwargs:
          domain: opensandbox-server.opensandbox-system.svc.cluster.local
          api_key: ${oc.env:OPENSANDBOX_API_KEY}
          protocol: http
          use_server_proxy: true
          exec_use_server_proxy: true
          batch_create_concurrency: 128
          batch_create_retries: 10
          batch_create_retry_delay_s: 5.0
          batch_create_retry_max_delay_s: 90.0
          request_timeout_s: 300
          create_request_timeout_s: 1200
          create_timeout_s: 1200
          sdk_skip_health_check: true
          create_probe_timeout_s: 60
          create_probe_deadline_s: 180
          create_probe_stable_count: 2
          create_probe_stable_delay_s: 1.0
          operation_retries: 5
          operation_retry_delay_s: 1.0
          operation_retry_max_delay_s: 45.0
          command_retries: 3
          close_timeout_s: 30
      sandbox_spec:
        timeout_s: 18000
        ready_timeout_s: 1200
        resources:
          cpu: "1"
          memory: 8Gi
          ephemeral-storage: 20Gi
        platform:
          os: linux
          arch: amd64
        image_rewrites:
        - from: swebench/
          to: mirror.gcr.io/swebench/
        metadata:
          benchmark: swebench-verified
          harness: mini-swe-agent
          sandbox-api: opensandbox-sdk
      sandbox_environment_kwargs:
        cwd: /testbed
        conda_env: testbed
        activate_conda: true
        user: root
        delete: true
      run_golden: false
      step_timeout: 600
      eval_timeout: 1800
      skip_if_exists: false
      step_limit: 250
      collapse_limit: 3
