mini_swe_agent_2:
  responses_api_agents:
    mini_swe_agent_2:
      entrypoint: app.py
      domain: coding
      description: Software engineering tasks driven by mini-swe-agent harness on Daytona.
      value: Improve agentic software engineering capabilities.
      model_server:
        type: responses_api_models
        name: policy_model
      concurrency: 3
      env: sandbox
      sandbox_provider:
        daytona:
          connection:
            api_key: ${oc.env:DAYTONA_API_KEY}
          create:
            timeout_s: 1200
            retries: 4
            retry_delay_s: 5.0
            retry_max_delay_s: 90.0
            auto_stop_interval: 30
            auto_delete_interval: 600
          probe:
            timeout_s: 60
            deadline_s: 180
          operations:
            retries: 4
            retry_delay_s: 1.0
            retry_max_delay_s: 45.0
            command_retries: 2
            close_timeout_s: 60
            file_timeout_s: 1800
          batch:
            concurrency: 3
      sandbox_spec:
        timeout_s: 18000
        ready_timeout_s: 1200
        resources:
          cpu: "2"
          memory: "1"
          ephemeral-storage: 20Gi
          disk: "9"
        provider_options:
          platform:
            os: linux
            arch: amd64
        metadata:
          benchmark: swebench-verified
          harness: mini-swe-agent
          sandbox-api: daytona-sdk
      sandbox_environment_kwargs:
        cwd: /testbed
        conda_env: testbed
        activate_conda: true
        user: root
      run_golden: false
      step_timeout: 600
      eval_timeout: 1800
      skip_if_exists: false
      step_limit: 250
