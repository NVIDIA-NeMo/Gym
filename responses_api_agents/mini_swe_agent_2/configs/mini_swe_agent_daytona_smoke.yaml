mini_swe_agent_2:
  responses_api_agents:
    mini_swe_agent_2:
      entrypoint: app.py
      domain: coding
      description: Software engineering tasks driven by mini-swe-agent harness on Daytona.
      value: Improve agentic software engineering capabilities.
      model_server:
        type: responses_api_models
        name: policy_model
      concurrency: 3
      env: sandbox
      sandbox_provider: sandbox
      sandbox_spec:
        ttl_s: 18000
        ready_timeout_s: 1200
        resources:
          cpu: "2"
          memory_mib: 1024
          disk_gib: 9
        provider_options: {}
        metadata:
          benchmark: swebench-verified
          harness: mini-swe-agent
      sandbox_environment_kwargs:
        cwd: /testbed
        conda_env: testbed
        activate_conda: true
        user: root
      run_golden: false
      step_timeout: 1500
      eval_timeout: 1800
      skip_if_exists: false
      step_limit: 250
