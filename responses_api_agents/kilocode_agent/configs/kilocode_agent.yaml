kilocode_agent:
  responses_api_agents:
    kilocode_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: ???
      concurrency: 8
      command: kilo
      model: nvinf/nvidia/qwen/qwen3-next-80b-a3b-instruct
      openai_api_key: ""
      openai_base_url: null
      env: {}
      workspace_root: outputs/kilocode_agent/workspaces
      repo_dir: null
      thinking: false
      system_prompt: null
      setup_timeout: 900
      timeout: 900
      extra_args: []
      # written to kilo.json in the run dir (OpenCode-compatible config schema)
      kilo_config:
        permission:
          bash: allow
          edit: allow
          webfetch: allow
        provider:
          nvinf:
            npm: "@ai-sdk/openai-compatible"
            options:
              baseURL: https://integrate.api.nvidia.com/v1
              apiKey: ${nvidia_api_key}
            models:
              nvidia/qwen/qwen3-next-80b-a3b-instruct: {}
      kilo_version: 7.4.15
