scicode_agent:
  responses_api_agents:
    scicode_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: scicode
      model_server:
        type: responses_api_models
        name: policy_model
      # Per-sub-step prompt template (the benchmark config may override).
      prompt_fpath: benchmarks/scicode/prompts/default.yaml
      # Inject each sub-step's scientific background into the prompt context.
      with_background: true
      # Example smoke dataset; the benchmark config replaces this with the benchmark dataset.
      datasets:
        - name: example
          type: example
          jsonl_fpath: resources_servers/scicode/data/example.jsonl
          prompt_config: null
          num_repeats: 1
