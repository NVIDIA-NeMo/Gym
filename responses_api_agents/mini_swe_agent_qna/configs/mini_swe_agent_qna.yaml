# Mini-SWE-Agent harness for SWE-Atlas Codebase QnA.
#
# Chains to the swe_atlas_qna rubric-judge resources server (which owns reward)
# and drives the mini-swe-agent bash loop inside a Gym sandbox. This example uses
# the Apptainer provider for cluster ``.sif`` images; swap the sandbox_provider
# block for another provider (docker, opensandbox, ...) as needed.
config_paths:
  - resources_servers/swe_atlas_qna/configs/swe_atlas_qna.yaml

swe_atlas_qna_mini_swe_agent:
  responses_api_agents:
    mini_swe_agent_qna:
      entrypoint: app.py
      domain: coding
      description: Mini-SWE-Agent harness for SWE-Atlas Codebase QnA — explores a repo in a sandbox, answer graded by rubric judge.
      value: Evaluate deep codebase comprehension with a repo-exploring agent.
      model_server:
        type: responses_api_models
        name: policy_model
      resources_server:
        type: resources_servers
        name: swe_atlas_qna_resources_server
      concurrency: 16
      env: sandbox
      # Inline Apptainer provider. On an HPC node with the `apptainer` binary,
      # this runs each task in a persistent instance. Add default_binds / extra
      # args as your cluster requires.
      sandbox_provider:
        apptainer:
          exec:
            default_timeout_s: 900
          create:
            mount_point: /sandbox
      sandbox_spec:
        resources:
          cpu: 4
          memory_mib: 16384
      sandbox_environment_kwargs:
        cwd: /app
        user: root
      # Point at your cluster .sif images, filled from the row's verifier_metadata,
      # e.g. "/lustre/sifs/{sif_basename}". When null, the row's docker_image is
      # used directly (Apptainer pulls docker://...).
      image_template: null
      mini_swe_config_path: responses_api_agents/mini_swe_agent_qna/configs/mswea_qa_config.yaml
      answer_path: /logs/agent/answer.txt
      step_timeout: 900
      step_limit: 250
      datasets:
        - name: example
          type: example
          jsonl_fpath: resources_servers/swe_atlas_qna/data/example.jsonl
