# Sandbox-server prototype: ONE external_harness agent + ONE sandbox server,
# exercising four grading topologies selected per task by verifier_metadata.mode:
#   0 none     -> verifier grades a harvested file, touches no sandbox
#   1 patch    -> verifier creates its OWN fresh box, applies harvested artifact
#   2 live_ref -> verifier operates the SAME live box via the passed sandbox_ref
#   3 codegen  -> verifier creates its OWN fresh box, runs code from the response
#
# The agent's box (node, for Claude Code) and the verifier's eval boxes
# (python) are all leased from the one sandbox server (docker provider).
#
# Requires a local vLLM with tool calling:
#   vllm serve Qwen/Qwen2.5-7B-Instruct --port 8000 \
#     --enable-auto-tool-choice --tool-call-parser hermes --max-model-len 32768
# and env.yaml with policy_base_url / policy_api_key / policy_model_name.
#
#   gym eval run --config responses_api_agents/external_harness/configs/sandbox_demo_claude_code.yaml --split validation

policy_model:
  responses_api_models:
    vllm_model:
      entrypoint: app.py
      base_url: ${policy_base_url}
      api_key: ${policy_api_key}
      model: ${policy_model_name}
      uses_reasoning_parser: false
      return_token_id_information: false
      observability:
        enabled: true
        capture_dir: ng_captures
        run_id: workstation
        return_token_ids: false

pool_sandbox_server:
  sandbox_servers:
    sandbox_server:
      entrypoint: app.py
      sandbox_provider:
        docker:
          create:
            # The harness/eval containers must reach the model gate on the host.
            network: host
      max_concurrent: 16
      default_ttl_s: 1800

sandbox_demo:
  resources_servers:
    sandbox_demo:
      entrypoint: app.py
      domain: coding

sandbox_demo_agent:
  responses_api_agents:
    external_harness:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: sandbox_demo
      model_server:
        type: responses_api_models
        name: policy_model
      policy_model_name: ${policy_model_name}
      settings:
        harness: claude_code
        builder: prefix_merging
        training_mode: false
        # Create the harness box THROUGH the sandbox server (not an in-process
        # provider) so the verifier can attach to it / spin up eval boxes.
        sandbox_server: pool_sandbox_server
        sandbox_spec:
          image: node:20-bookworm-slim
          workdir: /tmp/nemo-gym-harness
        harness_spec:
          pinned_version: null
          max_output_tokens: 4096
          bare: false
      datasets:
        - name: example
          type: validation
          license: MIT
          jsonl_fpath: resources_servers/sandbox_demo/data/example.jsonl
