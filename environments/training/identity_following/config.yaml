config_paths:
- resources_servers/genrm_compare/configs/genrm_compare.yaml
identity_following_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: genrm_compare_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/genrm_compare/data/example.jsonl
      - name: train
        type: train
        jsonl_fpath: resources_servers/genrm_compare/data/Nemotron-RL-Identity-Following-v1_train.jsonl
        huggingface_identifier:
          repo_id: nvidia/Nemotron-RL-Identity-Following-v1
          artifact_fpath: train.jsonl
        license: Creative Commons Attribution 4.0 International
