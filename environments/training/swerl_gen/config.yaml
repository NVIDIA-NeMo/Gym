config_paths:
- resources_servers/swerl_gen/configs/swerl_gen.yaml
swerl_gen_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: swerl_gen_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: train
        type: train
        jsonl_fpath: resources_servers/swerl_gen/data/train.jsonl
        num_repeats: 1
        gitlab_identifier:
          dataset_name: swerl_gen
          version: 0.0.1
          artifact_fpath: train.jsonl
        license: Apache 2.0
      - name: validation
        type: validation
        jsonl_fpath: resources_servers/swerl_gen/data/validation.jsonl
        num_repeats: 1
        gitlab_identifier:
          dataset_name: swerl_gen
          version: 0.0.1
          artifact_fpath: validation.jsonl
        license: Apache 2.0
      - name: example
        type: example
        jsonl_fpath: resources_servers/swerl_gen/data/example.jsonl
        num_repeats: 1
