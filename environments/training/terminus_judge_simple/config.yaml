config_paths:
- resources_servers/terminus_judge/configs/terminus_judge_simple.yaml
terminus_judge_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      max_steps: 1
      resources_server:
        type: resources_servers
        name: terminus_judge_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: train
        type: train
        jsonl_fpath: resources_servers/terminus_judge/data/train.jsonl
        num_repeats: 1
        gitlab_identifier:
          dataset_name: terminus_judge
          version: 0.0.1
          artifact_fpath: train.jsonl
        license: Apache 2.0
      - name: validation
        type: validation
        jsonl_fpath: resources_servers/terminus_judge/data/validation.jsonl
        num_repeats: 1
        gitlab_identifier:
          dataset_name: terminus_judge
          version: 0.0.1
          artifact_fpath: validation.jsonl
        license: Apache 2.0
      - name: example
        type: example
        jsonl_fpath: resources_servers/terminus_judge/data/example.jsonl
        num_repeats: 1
