config_paths:
- resources_servers/swerl_llm_judge/configs/swerl_llm_judge.yaml
swerl_llm_judge_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: swerl_llm_judge
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: train
        type: train
        jsonl_fpath: resources_servers/swerl_llm_judge/data/train.jsonl
        gitlab_identifier:
          dataset_name: swe_rl_llm_judge
          version: 0.0.1
          artifact_fpath: train.jsonl
        license: MIT
      - name: validation
        type: validation
        jsonl_fpath: resources_servers/swerl_llm_judge/data/validation.jsonl
        gitlab_identifier:
          dataset_name: swe_rl_llm_judge
          version: 0.0.1
          artifact_fpath: validation.jsonl
        license: MIT
      - name: example
        type: example
        jsonl_fpath: resources_servers/swerl_llm_judge/data/example.jsonl
