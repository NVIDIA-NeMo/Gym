name: Test inference provider keys

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "responses_api_models/chat_completions_model/**"
      - ".github/workflows/test-inference-providers.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: ${{ matrix.provider }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: fireworks
            base_url: https://api.fireworks.ai/inference/v1
            secret_name: FIREWORKS
            model: accounts/fireworks/models/llama-v3p1-8b-instruct
          - provider: openrouter
            base_url: https://openrouter.ai/api/v1
            secret_name: OPENROUTER
            model: meta-llama/llama-3.1-8b-instruct
          - provider: deepinfra
            base_url: https://api.deepinfra.com/v1/openai
            secret_name: DEEPINFRA
            model: meta-llama/Meta-Llama-3.1-8B-Instruct
          - provider: friendli
            base_url: https://inference.friendli.ai/v1
            secret_name: FRIENDLIAI
            model: meta-llama/Meta-Llama-3.1-8B-Instruct
          - provider: baseten
            base_url: https://bridge.baseten.co/v1
            secret_name: BASETEN
            model: meta-llama/Meta-Llama-3.1-8B-Instruct
          - provider: hf_inference
            base_url: https://router.huggingface.co/v1
            secret_name: HUGGINGFACE
            model: meta-llama/Meta-Llama-3.1-8B-Instruct
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv venv --python 3.12
          source .venv/bin/activate
          uv sync --extra dev

      - name: Verify API key is set
        env:
          API_KEY: ${{ secrets[matrix.secret_name] }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::error::Secret ${{ matrix.secret_name }} is not set"
            exit 1
          fi
          echo "Secret ${{ matrix.secret_name }} is configured"

      - name: Smoke test — chat completion
        env:
          API_KEY: ${{ secrets[matrix.secret_name] }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import os, sys, json

          from openai import OpenAI

          provider = "${{ matrix.provider }}"
          client = OpenAI(
              base_url="${{ matrix.base_url }}",
              api_key=os.environ["API_KEY"],
          )

          print(f"Testing {provider} with model ${{ matrix.model }}...")

          try:
              response = client.chat.completions.create(
                  model="${{ matrix.model }}",
                  messages=[{"role": "user", "content": "Say 'hello' and nothing else."}],
                  max_tokens=16,
                  temperature=0,
              )
              content = response.choices[0].message.content
              print(f"✓ {provider}: {content!r}")
              print(f"  model: {response.model}")
              print(f"  usage: {response.usage}")
          except Exception as e:
              print(f"✗ {provider}: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Smoke test — via nemo-gym ChatCompletionsModel server
        env:
          API_KEY: ${{ secrets[matrix.secret_name] }}
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import os, sys
          from unittest.mock import MagicMock
          from fastapi.testclient import TestClient

          from nemo_gym.server_utils import ServerClient
          from responses_api_models.chat_completions_model.app import (
              ChatCompletionsModel,
              ChatCompletionsModelConfig,
          )

          provider = "${{ matrix.provider }}"
          config = ChatCompletionsModelConfig(
              host="0.0.0.0",
              port=8081,
              base_url="${{ matrix.base_url }}",
              api_key=os.environ["API_KEY"],
              model="${{ matrix.model }}",
              entrypoint="",
              name="",
          )
          server = ChatCompletionsModel(config=config, server_client=MagicMock(spec=ServerClient))
          app = server.setup_webserver()
          client = TestClient(app)

          print(f"Testing {provider} via /v1/chat/completions ...")
          resp = client.post("/v1/chat/completions", json={
              "model": "${{ matrix.model }}",
              "messages": [{"role": "user", "content": "Say 'hello' and nothing else."}],
              "max_tokens": 16,
              "temperature": 0,
          })
          if resp.status_code != 200:
              print(f"✗ {provider} chat_completions: HTTP {resp.status_code} — {resp.text}", file=sys.stderr)
              sys.exit(1)
          data = resp.json()
          content = data["choices"][0]["message"]["content"]
          print(f"✓ {provider} chat_completions: {content!r}")

          print(f"Testing {provider} via /v1/responses ...")
          resp = client.post("/v1/responses", json={
              "model": "${{ matrix.model }}",
              "input": [{"role": "user", "content": "Say 'hello' and nothing else."}],
              "max_output_tokens": 16,
              "temperature": 0,
          })
          if resp.status_code != 200:
              print(f"✗ {provider} responses: HTTP {resp.status_code} — {resp.text}", file=sys.stderr)
              sys.exit(1)
          data = resp.json()
          output_text = data.get("output_text") or data["output"][0].get("content", [{}])[0].get("text", "")
          print(f"✓ {provider} responses: {output_text!r}")
          PYEOF

  summary:
    name: Provider test summary
    runs-on: ubuntu-latest
    needs: smoke-test
    if: always()
    steps:
      - name: Report results
        run: |
          echo "## Inference Provider Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Provider | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          PROVIDERS="fireworks openrouter deepinfra friendli baseten hf_inference"
          OVERALL="success"

          for provider in $PROVIDERS; do
            # Matrix jobs inherit the needs result — individual statuses
            # are not directly accessible, so we report the aggregate
            echo "| $provider | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall: ${{ needs.smoke-test.result }}**" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.smoke-test.result }}" = "failure" ]; then
            echo "::warning::Some provider tests failed — check individual job logs"
          fi
