name: Unit tests

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_call:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Fail on draft PRs
        if: github.event.pull_request.draft == true
        run: |
          echo "Failing on draft PR to enforce this check to run"
          exit 1

      - name: Setup for test
        run: |
          sudo apt-get update
          # Curl is required for setup_nvidia.sh to download uv
          # ca-certificates is there to support curl and mitigate `curl: (77) error setting certificate file: /etc/ssl/certs/ca-certificates.crt`
          sudo apt-get install -y --no-install-recommends git curl ca-certificates
          # The flow below should be used and synced with any Docker or container related flows. There is no script here to keep it 100% explicit.
          # This is how we test and this is how you should use/consume.
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv venv --python 3.12
          source .venv/bin/activate
          uv sync --extra dev

      - name: Test
        run: |
          source .venv/bin/activate
          ng_dev_test
          ng_test_all +fail_on_total_and_test_mismatch=true

  test-wheel-install:
    name: Test Wheel Install (E2E)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup for test
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends git curl ca-certificates
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build wheel
        run: uv build

      - name: Test PyPI-like install
        run: |
          cd /tmp
          uv venv test_install --python 3.12
          source test_install/bin/activate
          uv pip install $GITHUB_WORKSPACE/dist/*.whl
          python -c "import nemo_gym; print(f'Installed nemo-gym {nemo_gym.__version__}')"

      - name: Test ng_init works from wheel
        run: |
          cd /tmp
          source test_install/bin/activate
          ng_init_resources_server +entrypoint=test_hello_world
          test -f test_hello_world/app.py || exit 1

      - name: Test ng_test with built-in env from wheel
        run: |
          cd /tmp
          source test_install/bin/activate
          # Copy example server from source since it's not in the wheel
          cp -r $GITHUB_WORKSPACE/resources_servers .
          export UV_FIND_LINKS=$GITHUB_WORKSPACE/dist
          ng_test +entrypoint=resources_servers/example_single_tool_call
