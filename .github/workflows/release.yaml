name: "Build, validate, and release NeMo-Gym"

on:
  push:
    branches:
      - main
      - "r**"
      - "pull-request/**"
      - "deploy-release/*"
  workflow_dispatch:
    inputs:
      release-ref:
        description: Commit SHA to release (must be a full 40-char SHA, not a branch name)
        required: true
        type: string
      dry-run:
        description: Compute the release but do not publish wheel, GH release, or docs.
        required: true
        default: true
        type: boolean
      create-gh-release:
        description: Create a GitHub release
        required: true
        default: true
        type: boolean
      version-bump-branch:
        description: Branch for version bump
        required: true
        type: string
      gh-release-from-tag:
        description: Tag of previous release for changelog builder
        required: false
        type: string
        default: ""

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  pre-flight:
    if: github.event_name != 'workflow_dispatch'
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_cicd_preflight.yml@v0.94.1

  drop-rc:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      release-ref: ${{ steps.commit.outputs.sha || inputs.release-ref }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.BOT_ID }}
          private-key: ${{ secrets.BOT_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release-ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Drop RC suffix and push to release branch
        id: commit
        env:
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          FILE="nemo_gym/package_info.py"
          PRERELEASE=$(awk '/^PRE_RELEASE = /' "$FILE" | awk -F'= ' '{print $2}' | tr -d "\"' ")

          if [[ -z "$PRERELEASE" ]]; then
            echo "PRE_RELEASE is already empty — no drop needed"
            exit 0
          fi

          echo "Dropping PRE_RELEASE='$PRERELEASE' from $FILE"
          sed -i '/^PRE_RELEASE/c\PRE_RELEASE = ""' "$FILE"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "dry-run: would commit drop-rc to release branch and use new SHA"
            exit 0
          fi

          RELEASE_BRANCH=$(git branch -r --contains HEAD \
            | grep -oP 'origin/r\d+\.\d+\.\d+$' | head -1 | sed 's|origin/||')
          if [[ -z "$RELEASE_BRANCH" ]]; then
            echo "::error::No r*.*.* release branch found containing ${{ inputs.release-ref }}"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout "$RELEASE_BRANCH"
          git add "$FILE"
          git commit -s -m "chore: drop rc pre-release tag for ${RELEASE_BRANCH} release"
          git push origin "$RELEASE_BRANCH"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release:
    needs: [pre-flight, drop-rc]
    if: |
      !cancelled() && !failure()
      && !(needs.pre-flight.outputs.docs_only == 'true'
           || needs.pre-flight.outputs.is_deployment_workflow == 'true')
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_release_library.yml@v1.4.3
    with:
      release-ref: ${{ needs.drop-rc.outputs.release-ref || inputs.release-ref || github.sha }}
      python-package: nemo_gym
      library-name: NeMo-Gym
      validate-only: ${{ github.event_name != 'workflow_dispatch' }}
      dry-run: ${{ inputs.dry-run || false }}
      version-bump-branch: ${{ inputs.version-bump-branch || github.ref_name }}
      create-gh-release: ${{ inputs.create-gh-release || true }}
      packaging: uv
      skip-test-wheel: true
      wheel-content-ignore: "W002,W004,W009"
      app-id: ${{ vars.BOT_ID }}
      publish-docs: false
      run-on-version-tag-only: ${{ github.ref_name != 'main' }}
      gh-release-from-tag: ${{ inputs.gh-release-from-tag || '' }}
      restrict-to-admins: true
    secrets: inherit  # pragma: allowlist secret

  release-summary:
    needs: [pre-flight, drop-rc, release]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILED_JOBS=$(gh run view $GITHUB_RUN_ID --repo ${{ github.repository }} --json jobs --jq '[.jobs[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "action_required")] | length')

          if [ "${FAILED_JOBS:-0}" -eq 0 ]; then
              echo "✅ All previous jobs completed successfully"
              exit 0
          else
              echo "❌ Found $FAILED_JOBS failed job(s)"
              gh run view $GITHUB_RUN_ID --repo ${{ github.repository }} --json jobs --jq '.jobs[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "action_required") | .name'
              exit 1
          fi
