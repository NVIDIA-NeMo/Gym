#
# Gym-spawned Kimi-K2.6 vLLM deployment (MULTIMODAL / vision enabled).
#
# This is the gym `local_vllm_model` analog of the NEL deployment fragments
# (kimi_k2.6_deployment_hsg.yaml / _gym.yaml). Gym launches vLLM in-process via
# Ray actors (no sqsh container / HAProxy), so only the serve *flags* carry
# over. The single most important difference vs the NEL configs: we DROP
# `--language-model-only` so the vision tower loads and the model can read the
# rasterized deliverable pages (see resources_servers/gdpval/media_conversion.py).
#
# Serving shape: TP=8, DP=1, PP=1. The tensor-parallel group may span multiple
# nodes — on this cluster (4 GPUs/node) TP=8 spans two nodes, which requires
# VLLM_RAY_DP_PACK_STRATEGY: span (set below) so gym spreads the instance across
# nodes. Use `strict` only when the whole instance fits on a single node. Size
# tensor_parallel_size to your total GPU count and node layout.
#
# Used directly as `--model-type` this serves Kimi as a POLICY model under the
# `policy_model` key. To use it as the GDPVal *judge*, use the dedicated overlay
# resources_servers/gdpval/configs/gdpval_kimi_local_judge.yaml (which reuses
# these exact serve settings under the judge server name).
policy_model:
  responses_api_models:
    local_vllm_model:
      entrypoint: app.py
      # Local checkpoint path (HF-format). Defaults to the reviewed GDPVal
      # baseline checkpoint; override with KIMI_CHECKPOINT_PATH or ++...model=.
      model: ${oc.env:KIMI_CHECKPOINT_PATH,/lustre/fsw/portfolios/coreai/projects/coreai_dlalgo_compeval/checkpoints/hf_cache/Kimi-K2.6-full-2755962d07cb}
      return_token_id_information: false
      # Kimi K2.6 emits reasoning; the kimi_k2 reasoning parser splits it out so
      # the judge's verdict lands in message.content (gym re-wraps it in <think>).
      uses_reasoning_parser: true
      debug: false

      hf_home: null

      vllm_serve_env_vars:
        # TP=8 across 4-GPU nodes spans two nodes → `span` (gym spreads the
        # instance across nodes). Use `strict` only when the whole instance fits
        # on a single node.
        VLLM_RAY_DP_PACK_STRATEGY: span
        # Match the NEL deployment's engine/runtime timeouts for this big MoE.
        VLLM_ENGINE_READY_TIMEOUT_S: "3600"
        RAY_CGRAPH_get_timeout: "600"

      vllm_serve_kwargs:
        # Parallelism: TP=8 / DP=1 (spans two 4-GPU nodes on hsg cluster).
        data_parallel_size: 1
        tensor_parallel_size: 8
        pipeline_parallel_size: 1

        gpu_memory_utilization: 0.80

        # Serve the model under a stable, friendly id so downstream `model=` refs
        # don't have to spell out the checkpoint path.
        served_model_name: [moonshotai/Kimi-K2.6]

        # Kimi-specific parsers + expert parallel + threaded load, ported from
        # kimi_k2.6_deployment_hsg.yaml. NOTE: `--language-model-only` is
        # intentionally OMITTED so the vision tower loads (multimodal judging).
        enable_expert_parallel: true
        trust_remote_code: true
        enable_auto_tool_choice: true
        tool_call_parser: kimi_k2
        reasoning_parser: kimi_k2
        model_loader_extra_config:
          enable_multithread_load: true
          num_threads: 96
