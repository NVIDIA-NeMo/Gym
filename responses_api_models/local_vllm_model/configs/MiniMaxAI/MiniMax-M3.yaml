#
# Gym-spawned MiniMax-M3 vLLM deployment (MULTIMODAL — reads images, audio, and
# video). MiniMax-M3 is used as the GDPVal local judge; unlike an image-only VLM
# it can consume the raw audio/video deliverables directly (see
# resources_servers/gdpval/configs/gdpval_minimax_local_judge.yaml).
#
# This mirrors the vendor-recommended vLLM serve command for GB200s:
#
#   vllm serve MiniMaxAI/MiniMax-M3 \
#     --block-size 128 \
#     -cc.pass_config.fuse_allreduce_rms=False \
#     --tensor-parallel-size 8 --nnodes 2 --node-rank 0 --master-addr $HEAD_IP \
#     --tool-call-parser minimax_m3 --enable-auto-tool-choice \
#     --reasoning-parser minimax_m3
#
# Gym launches vLLM in-process via Ray actors, so the multi-node orchestration
# flags (--nnodes / --node-rank / --master-addr) are NOT passed here — gym/Ray
# handle placement. TP=8 across 4-GPU GB200 nodes spans two nodes, which requires
# VLLM_RAY_DP_PACK_STRATEGY: span (set below). Use `strict` only when the whole
# instance fits on a single node.
#
# Used directly as `--model-type` this serves MiniMax as a POLICY model under the
# `policy_model` key. To use it as the GDPVal *judge*, use the dedicated overlay
# resources_servers/gdpval/configs/gdpval_minimax_local_judge.yaml (which reuses
# these exact serve settings under the judge server name).
policy_model:
  responses_api_models:
    local_vllm_model:
      entrypoint: app.py
      # Local checkpoint path (HF-format, MXFP8). Override with
      # MINIMAX_CHECKPOINT_PATH or ++...model=.
      model: ${oc.env:MINIMAX_CHECKPOINT_PATH,/lustre/fsw/portfolios/coreai/projects/coreai_dlalgo_compeval/checkpoints/hf_cache/MiniMax-M3-MXFP8}
      return_token_id_information: false
      # MiniMax-M3 emits reasoning; the minimax_m3 reasoning parser splits it out
      # so the judge's verdict lands in message.content (gym re-wraps in <think>).
      uses_reasoning_parser: true
      debug: false

      hf_home: null

      vllm_serve_env_vars:
        # TP=8 across 4-GPU GB200 nodes spans two nodes → `span` (gym spreads the
        # instance across nodes). Use `strict` only when the whole instance fits
        # on a single node.
        VLLM_RAY_DP_PACK_STRATEGY: span
        # Multi-node NCCL/GLOO must bind to the cluster's fast interface. Set
        # IFACE_NAME (or the two vars directly) to your fabric iface; the default
        # is a common fallback and may need to change for your node layout.
        NCCL_SOCKET_IFNAME: ${oc.env:NCCL_SOCKET_IFNAME,${oc.env:IFACE_NAME,eth0}}
        GLOO_SOCKET_IFNAME: ${oc.env:GLOO_SOCKET_IFNAME,${oc.env:IFACE_NAME,eth0}}
        # Generous engine/runtime timeouts for this large MoE loading over 2 nodes.
        VLLM_ENGINE_READY_TIMEOUT_S: "3600"
        RAY_CGRAPH_get_timeout: "600"

      vllm_serve_kwargs:
        # Parallelism: TP=8 / DP=1 (spans two 4-GPU GB200 nodes).
        data_parallel_size: 1
        tensor_parallel_size: 8
        pipeline_parallel_size: 1

        # From the vendor serve command: 128-token paged-KV blocks.
        block_size: 128

        gpu_memory_utilization: 0.90

        # Serve under a stable, friendly id (matches the vendor model id) so
        # downstream `model=` refs don't have to spell out the checkpoint path.
        served_model_name: [MiniMaxAI/MiniMax-M3]

        # MiniMax-specific tool/reasoning parsers (vendor command).
        trust_remote_code: true
        enable_auto_tool_choice: true
        tool_call_parser: minimax_m3
        reasoning_parser: minimax_m3

        # `-cc.pass_config.fuse_allreduce_rms=False` from the vendor command: the
        # allreduce+RMSNorm fusion pass is disabled. Expressed as the nested
        # compilation-config dict gym passes straight through to vLLM. If your
        # vLLM build rejects this form, drop it — it is a fusion toggle, not
        # required for correctness on all builds.
        compilation_config:
          pass_config:
            fuse_allreduce_rms: false
