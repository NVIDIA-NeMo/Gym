# Math benchmark config with policy + judge model.
# Contains an intentional error: agent references judge_model instead of policy_model.

math_benchmark:
  resources_servers:
    equivalence_llm_judge:
      entrypoint: app.py
      domain: math
      verified: false
      judge_model_server:
        type: responses_api_models
        name: judge_model
      judge_responses_create_params:
        temperature: 0.0
        max_output_tokens: 1024
      judge_endpoint_max_concurrency: 16
      check_twice_swap: true
      reward_if_swap_fails: 0.0
      datasets:
      - name: math_example
        type: example
        jsonl_fpath: resources_servers/equivalence_llm_judge/data/example.jsonl

policy_model:
  responses_api_models:
    openai_model:
      entrypoint: app.py
      base_url: ${policy_base_url}
      api_key: ${policy_api_key}
      model_name: ${policy_model_name}

judge_model:
  responses_api_models:
    openai_model:
      entrypoint: app.py
      base_url: ${judge_base_url}
      api_key: ${judge_api_key}
      model_name: ${judge_model_name}

# BUG: agent references judge_model instead of policy_model
math_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: math_benchmark
      model_server:
        type: responses_api_models
        name: judge_model
      datasets:
      - name: math_example
        type: example
        jsonl_fpath: resources_servers/equivalence_llm_judge/data/example.jsonl
