math_algebra:
  resources_servers:
    math_algebra:
      entrypoint: app.py
      domain: math
      verified: false
      datasets:
      - name: math_example
        type: example
        jsonl_fpath: resources_servers/math_algebra/data/example.jsonl
      - name: math_train
        type: train
        jsonl_fpath: resources_servers/math_algebra/data/train.jsonl
        gitlab_identifier:
          dataset_name: math_algebra
          version: 0.0.1
          artifact_fpath: train.jsonl
        license: Apache-2.0

math_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: math_algebra
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: math_example
        type: example
        jsonl_fpath: resources_servers/math_algebra/data/example.jsonl
