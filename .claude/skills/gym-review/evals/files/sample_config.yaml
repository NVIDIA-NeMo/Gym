# Sample YAML config with intentional issues for eval testing.
my_benchmark:
  resources_servers:
    my_benchmark:
      entrypoint: app.py
      domain: coding
      verified: true
      timeout: 30
      num_processes: 4
      datasets:
      - name: my_example
        type: example
        jsonl_fpath: resources_servers/my_benchmark/data/example.jsonl
      - name: my_train
        type: train
        jsonl_fpath: resources_servers/my_benchmark/data/train.jsonl
      - name: my_validation
        type: validation
        jsonl_fpath: resources_servers/my_benchmark/data/validation.jsonl
        gitlab_identifier:
          dataset_name: my_benchmark
          version: 0.0.1
          artifact_fpath: validation.jsonl
        license: Apache-2.0

my_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: my_benchmark
      model_server:
        type: responses_api_models
        name: policy_model
