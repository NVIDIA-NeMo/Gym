instances:
  - url: https://gym.docs.buildwithfern.com

title: NVIDIA NeMo Gym

footer: ./components/CustomFooter.tsx

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

colors:
  accentPrimary:
    dark: "#76B900"
    light: "#76B900"
  background:
    light: "#FFFFFF"
    dark: "#000000"

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /
  right-text: NeMo Gym

favicon: ./assets/NVIDIA_symbol.svg

css:
  - ./main.css

navbar-links:
  - type: github
    value: https://github.com/NVIDIA-NeMo/Gym

experimental:
  mdx-components:
    - ./components

versions:
  - display-name: Latest
    path: versions/latest.yml
    slug: latest
    availability: stable
  - display-name: v0.2.0
    path: versions/v0.2.0.yml
    slug: v0.2.0
