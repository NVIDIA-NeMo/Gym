apiVersion: apps/v1
kind: Deployment
metadata:
  name: gym-head
  namespace: gym
  labels:
    app.kubernetes.io/name: gym-head
    app.kubernetes.io/component: head-server
    app.kubernetes.io/part-of: nemo-gym
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gym-head
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gym-head
        app.kubernetes.io/component: head-server
        app.kubernetes.io/part-of: nemo-gym
    spec:
      serviceAccountName: gym-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: head
          image: ghcr.io/nvidia-nemo/gym/nemo-gym-head:latest
          imagePullPolicy: IfNotPresent
          workingDir: /opt/app-root/src

          env:
            - name: NEMO_GYM_CONFIG_DICT
              valueFrom:
                configMapKeyRef:
                  name: gym-config
                  key: config.yaml
            - name: NEMO_GYM_SKIP_RAY_INIT
              value: "1"
            - name: PYTHONPATH
              value: /opt/app-root/src

          ports:
            - containerPort: 11000
              name: http
              protocol: TCP

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /docs
              port: 11000
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 20

          readinessProbe:
            httpGet:
              path: /docs
              port: 11000
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /docs
              port: 11000
            periodSeconds: 30
            failureThreshold: 5

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
