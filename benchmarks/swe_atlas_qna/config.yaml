# SWE-Atlas Codebase QnA benchmark.
#
# Chains to the swe_atlas_qna rubric-judge resources server + agent config, then
# isolates this benchmark's agent wiring via ``_inherit_from`` so dataset
# overrides here don't leak back to the resources server's own smoke config.
config_paths:
  - resources_servers/swe_atlas_qna/configs/swe_atlas_qna.yaml

swe_atlas_qna_benchmark_resources_server:
  _inherit_from: swe_atlas_qna_resources_server

# NOTE: paired with simple_agent (single-turn, no repo access) as a placeholder
# so the benchmark is preparable and listable today. The real SWE-Atlas QnA eval
# runs through the mini-swe-agent QnA harness (which explores the repository in an
# Apptainer sandbox); swap the agent here once that harness lands.
swe_atlas_qna_benchmark_simple_agent:
  _inherit_from: swe_atlas_qna_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: swe_atlas_qna_benchmark_resources_server
      datasets:
      - name: swe_atlas_qna
        type: benchmark
        jsonl_fpath: benchmarks/swe_atlas_qna/data/swe_atlas_qna_benchmark.jsonl
        prompt_config: benchmarks/prompts/generic/default.yaml
        prepare_script: benchmarks/swe_atlas_qna/prepare.py
