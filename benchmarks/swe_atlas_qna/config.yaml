# SWE-Atlas Codebase QnA benchmark.
#
# Chains to the mini-swe-agent QnA harness config (which itself chains to the
# swe_atlas_qna rubric-judge resources server), then attaches the benchmark
# dataset to an inherited copy of that agent. The harness explores each
# repository in a sandbox (Apptainer .sif images) before answering; supply your
# cluster image path via ``image_template`` at launch, e.g.
#   +swe_atlas_qna_benchmark_mini_swe_agent.responses_api_agents.mini_swe_agent_qna.image_template=/lustre/sifs/{sif_basename}
config_paths:
  - responses_api_agents/mini_swe_agent_qna/configs/mini_swe_agent_qna.yaml

# ``_inherit_from`` moves the harness agent into this benchmark-scoped instance so
# the benchmark dataset override doesn't leak back to the harness's own config.
# The inherited agent keeps its resources_server reference (swe_atlas_qna), which
# owns the reward.
swe_atlas_qna_benchmark_mini_swe_agent:
  _inherit_from: swe_atlas_qna_mini_swe_agent
  responses_api_agents:
    mini_swe_agent_qna:
      datasets:
      - name: swe_atlas_qna
        type: benchmark
        jsonl_fpath: benchmarks/swe_atlas_qna/data/swe_atlas_qna_benchmark.jsonl
        # mini-swe builds its own prompt from verifier_metadata.problem_statement;
        # prompt_config still renders the row's ``question`` into a valid input.
        prompt_config: benchmarks/prompts/generic/default.yaml
        prepare_script: benchmarks/swe_atlas_qna/prepare.py
