config_paths:
  - resources_servers/ruler2/configs/ruler2.yaml

ruler2_benchmark_resources_server:
  _inherit_from: ruler2_resources_server

ruler2_benchmark_simple_agent:
  _inherit_from: ruler2_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: ruler2_benchmark_resources_server
      datasets:
      - name: ruler2
        type: benchmark
        jsonl_fpath: benchmarks/ruler2/data/ruler2_benchmark.jsonl
        prompt_config: benchmarks/ruler2/prompts/default.yaml
        prepare_script: benchmarks/ruler2/prepare.py
        license: Apache 2.0
