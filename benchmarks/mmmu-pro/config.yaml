# Vision MCQ: ``labbench2_vlm_agent`` embeds images from ``verifier_metadata.media_dir``;
# ``mcqa`` verifies letter answers (``lenient_answer_colon_md``).
config_paths:
  - resources_servers/mcqa/configs/mcqa.yaml

"mmmu-pro_mcqa_resources_server":
  _inherit_from: mcqa
  resources_servers:
    mcqa:
      grading_mode: lenient_answer_colon_md

"mmmu-pro_vlm_simple_agent":
  _inherit_from: mcqa_simple_agent
  responses_api_agents:
    simple_agent:
      entrypoint: responses_api_agents/labbench2_vlm_agent/app.py
      media_base_dir: benchmarks/mmmu-pro/data
      dpi: 170
      strip_images_from_output: true
      resources_server:
        name: mmmu-pro_mcqa_resources_server
      datasets:
      - name: mmmu-pro
        type: benchmark
        jsonl_fpath: benchmarks/mmmu-pro/data/mmmu-pro_benchmark.jsonl
        prompt_config: null
        prepare_script: benchmarks/mmmu-pro/prepare.py
        num_repeats: 1
