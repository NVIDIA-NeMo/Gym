# Finance Agent v2 (FABv2) benchmark: the public 27-question eval overlay on top
# of the finance_agent_v2 resources server. `gym eval prepare --benchmark
# finance_agent_v2` runs benchmarks/finance_agent_v2/prepare.py to (re)build the
# dataset; `gym eval run --benchmark finance_agent_v2` evaluates against it.
#
# NOTE: prepare.py imports the upstream `finance_agent` package (tools-only reuse),
# and `gym eval prepare` imports the prepare module in-process, so run it from the
# resource server's venv (which has both `gym` and `finance_agent`):
#   source resources_servers/finance_agent_v2/.venv/bin/activate
#   gym eval prepare --benchmark finance_agent_v2

# Chain to the existing finance_agent_v2 resources server + finance_agent config.
config_paths:
  - resources_servers/finance_agent_v2/configs/finance_agent_v2.yaml

# Defaults for judge-model interpolation vars in finance_agent_v2.yaml so the
# config resolves during prepare (no model needed). Override via env.yaml / CLI
# when running an actual evaluation.
search_judge_model_base_url: https://api.openai.com/v1
search_judge_model_api_key: ""
search_judge_model_name: gpt-5-mini

# Isolated copy of the resource server for this benchmark.
finance_agent_v2_benchmark_resources_server:
  _inherit_from: finance_agent_v2_resources_server

# Benchmark agent — inherits the finance_agent loop, overrides the dataset to the
# frozen benchmark split and points at the isolated resources server above.
finance_agent_v2_benchmark_agent:
  _inherit_from: finance_agent
  responses_api_agents:
    finance_agent:
      resources_server:
        name: finance_agent_v2_benchmark_resources_server
      datasets:
      - name: finance_agent_v2
        type: benchmark
        jsonl_fpath: benchmarks/finance_agent_v2/data/vals_v2_public_27q.jsonl
        prompt_config: null
        prepare_script: benchmarks/finance_agent_v2/prepare.py
        num_repeats: 1
