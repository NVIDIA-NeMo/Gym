browsecomp_benchmark_resources_server:
  resources_servers:
    tavily_search:
      entrypoint: app.py
      domain: agent
      debug: false
      use_judge: true
      judge_model_server:
        type: responses_api_models
        name: policy_model
      judge_responses_create_params:
        input: []
      verified: false

browsecomp_benchmark_agent:
  responses_api_agents:
    browsecomp_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: browsecomp_benchmark_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: browsecomp
        type: benchmark
        jsonl_fpath: benchmarks/browsecomp/data/browsecomp_benchmark.jsonl
        prompt_config: null
        prepare_script: benchmarks/browsecomp/prepare.py
        num_repeats: 1
