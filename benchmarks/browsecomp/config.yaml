# Chain to existing resource server + agent config
config_paths:
  - resources_servers/tavily_search/configs/tavily_search_no_judge.yaml

# We use `_inherit_from` directives to inherit from and not use the generic config above to ensure this benchmark config is isolated.
browsecomp_tavily_search_resources_server:
  _inherit_from: tavily_search_resources_server

browsecomp_tavily_search_simple_agent:
  _inherit_from: tavily_search_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: tavily_search_resources_server
      datasets:
      - name: browsecomp
        type: benchmark
        jsonl_fpath: benchmarks/browsecomp/data/aime25_benchmark.jsonl
        prepare_script: benchmarks/browsecomp/prepare.py
        num_repeats: 1
