# Judge model: openai/gpt-oss-20b via NVIDIA's public NIM API
# (integrate.api.nvidia.com).  Uses NVIDIA_API_KEY from the environment.
# Mirrors benchmarks/omniscience/judge_gptoss20b.yaml so the two benchmarks
# share exactly one committed default-judge configuration pattern.
judge_model:
  responses_api_models:
    openai_model:
      entrypoint: app.py
      openai_base_url: https://integrate.api.nvidia.com/v1
      openai_api_key: ${oc.env:NVIDIA_API_KEY,null}
      openai_model: openai/gpt-oss-20b
