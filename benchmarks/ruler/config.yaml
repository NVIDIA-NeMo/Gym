# Chain to existing resource server + agent config
config_paths:
  - resources_servers/ruler/configs/ruler.yaml

# We use `_inherit_from` directives to inherit from and not use the generic config above to ensure this benchmark config is isolated.
ruler_benchmark_resources_server:
  _inherit_from: ruler_resources_server

ruler_benchmark_simple_agent:
  _inherit_from: ruler_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: ruler_benchmark_resources_server
      datasets:
      - name: ruler
        type: benchmark
        jsonl_fpath: benchmarks/ruler/data/ruler_nemotron_3_1m_benchmark.jsonl
        prompt_config: null
        prepare_script: benchmarks/ruler/prepare_nemotron_3_1m.py
        num_repeats: 1

# RULER seeds an assistant "answer prefix" as the final input message (add_answer_prefix=True in the
# prepare script). Continue that turn on the model server so the model emits just the answer instead
# of starting a fresh assistant turn; enable_thinking=false keeps a reasoning model from emitting a
# think block before the answer. Overrides the vllm_model policy_model provided at run time.
policy_model:
  responses_api_models:
    vllm_model:
      continue_final_assistant_message: true
      # Serve the vLLM endpoint without a reasoning parser (thinking is off below), so Gym should
      # not try to extract/wrap <think> reasoning from the response.
      uses_reasoning_parser: false
      chat_template_kwargs:
        enable_thinking: false
