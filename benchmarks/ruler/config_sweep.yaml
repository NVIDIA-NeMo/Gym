config_paths:
  - resources_servers/ruler/configs/ruler.yaml

ruler_sweep_resources_server:
  _inherit_from: ruler_resources_server

ruler_sweep_simple_agent:
  _inherit_from: ruler_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: ruler_sweep_resources_server
      datasets:
        - name: ruler_sweep
          type: benchmark
          jsonl_fpath: benchmarks/ruler/data/ruler_sweep.jsonl
          prompt_config: null
          prepare_script: benchmarks/ruler/prepare_sweep.py
          num_repeats: 1
