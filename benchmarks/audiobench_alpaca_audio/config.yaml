config_paths:
  - resources_servers/audiobench_judge/configs/audiobench_judge.yaml
  - responses_api_models/vllm_model/configs/vllm_model.yaml

audiobench_alpaca_audio_judge_resources_server:
  _inherit_from: audiobench_judge

audiobench_alpaca_audio_judge_simple_agent:
  _inherit_from: audiobench_judge_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: audiobench_alpaca_audio_judge_resources_server
      datasets:
      - name: audiobench_alpaca_audio
        type: benchmark
        jsonl_fpath: benchmarks/audiobench_alpaca_audio/data/audiobench_alpaca_audio_test.jsonl
        prepare_script: benchmarks/audiobench_alpaca_audio/prepare.py
        prompt_config: benchmarks/audiobench_alpaca_audio/prompts/default.yaml
        license: Creative Commons Attribution Non Commercial 4.0
