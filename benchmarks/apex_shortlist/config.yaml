# Chain to existing resource server + agent config
config_paths:
  - resources_servers/math_with_judge/configs/math_with_judge.yaml

# We use `_inherit_from` directives to inherit from and not use the generic config
# above to ensure this benchmark config is isolated.
apex_shortlist_math_with_judge_resources_server:
  _inherit_from: math_with_judge
  resources_servers:
    math_with_judge:
      # Skills' apex-shortlist uses eval_type=math (symbolic-only) with no judge
      # pipeline by default. Disable the Gym judge fallback to keep parity.
      should_use_judge: false
      # Skills' `eval_type=math` also strips <think>...</think> (parse_reasoning=True)
      # and extracts via brace-matched \boxed{...} before symbolic grading. Without
      # this flag, math-verify scans the whole raw output including the reasoning
      # trace and picks up spurious mid-reasoning \boxed{} (or even plain integer)
      # extractions — that's what drives the `no_answer` gap (26.6% Skills vs
      # 1.0% Gym) and the +5pp pass@1 delta seen on the first parity run.
      parse_reasoning_like_skills: true

apex_shortlist_math_with_judge_simple_agent:
  _inherit_from: math_with_judge_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: apex_shortlist_math_with_judge_resources_server
      datasets:
      - name: apex_shortlist
        type: benchmark
        jsonl_fpath: benchmarks/apex_shortlist/data/apex_shortlist_benchmark.jsonl
        prompt_config: benchmarks/apex_shortlist/prompts/default.yaml
        prepare_script: benchmarks/apex_shortlist/prepare.py
