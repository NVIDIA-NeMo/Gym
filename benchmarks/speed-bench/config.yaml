config_paths:
  - resources_servers/speed_bench/configs/speed_bench.yaml

# Per-config resource server + agent. ng_prepare_benchmark expects exactly
# one dataset per agent, so each speed-bench config (qualitative,
# throughput_2k, …) gets its own agent.

speed_bench_qualitative_resources_server:
  _inherit_from: speed_bench_resources_server

speed_bench_qualitative_simple_agent:
  _inherit_from: speed_bench_simple_agent
  responses_api_agents:
    speed_bench_agent:
      resources_server:
        name: speed_bench_qualitative_resources_server
      datasets:
      - name: speed_bench_qualitative
        type: benchmark
        jsonl_fpath: benchmarks/speed-bench/data/speed_bench_qualitative_benchmark.jsonl
        prompt_config: null
        prepare_script: benchmarks/speed-bench/prepare.py
        license: NVIDIA Evaluation Dataset License Agreement

speed_bench_throughput_2k_resources_server:
  _inherit_from: speed_bench_resources_server

speed_bench_throughput_2k_simple_agent:
  _inherit_from: speed_bench_simple_agent
  responses_api_agents:
    speed_bench_agent:
      resources_server:
        name: speed_bench_throughput_2k_resources_server
      datasets:
      - name: speed_bench_throughput_2k
        type: benchmark
        jsonl_fpath: benchmarks/speed-bench/data/speed_bench_throughput_2k_benchmark.jsonl
        prompt_config: null
        prepare_script: benchmarks/speed-bench/prepare_throughput_2k.py
        license: NVIDIA Evaluation Dataset License Agreement
