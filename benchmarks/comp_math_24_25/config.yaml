# Chain to existing resource server + agent config
config_paths:
  - resources_servers/math_with_judge/configs/math_with_judge.yaml

# Isolated benchmark-specific inheritance.
comp_math_24_25_math_with_judge_resources_server:
  _inherit_from: math_with_judge

comp_math_24_25_math_with_judge_simple_agent:
  _inherit_from: math_with_judge_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: comp_math_24_25_math_with_judge_resources_server
      datasets:
      - name: comp_math_24_25
        type: benchmark
        jsonl_fpath: benchmarks/comp_math_24_25/data/comp_math_24_25_benchmark.jsonl
        prompt_config: benchmarks/prompts/generic_math.yaml
        prepare_script: benchmarks/comp_math_24_25/prepare.py
