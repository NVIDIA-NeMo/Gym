# SupChain-Bench (SC-bench): open-source models via chat-completions (vllm_model)
# For closed-source GPT models on HUD /v1/responses, use config_openai.yaml instead.
# Source: https://github.com/Damon-GSY/SC-bench
config_paths:
  - resources_servers/sc_bench/configs/sc_bench.yaml
  - responses_api_models/vllm_model/configs/vllm_model.yaml

# Default for instruct models on HUD (Kimi K2, Qwen instruct, etc.)
policy_model:
  responses_api_models:
    vllm_model:
      uses_reasoning_parser: false
      uses_interleaved_reasoning: false

# For thinking models: restart ng_run with config_thinking.yaml or override via CLI:
#   +policy_model.responses_api_models.vllm_model.uses_reasoning_parser=true
#   +policy_model.responses_api_models.vllm_model.uses_interleaved_reasoning=true

sc_bench_benchmark_resources_server:
  _inherit_from: sc_bench_resources_server
  resources_servers:
    sc_bench:
      data_dir: resources_servers/sc_bench/data/csv
      domain: agent
      verified: true
      description: SupChain-Bench supply chain order management tool-use evaluation
      value: Evaluate multi-step tool calling on trade/fulfillment/warehouse queries

sc_bench_benchmark_simple_agent:
  _inherit_from: sc_bench_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: sc_bench_benchmark_resources_server
      datasets:
      - name: sc_bench
        type: benchmark
        jsonl_fpath: benchmarks/sc_bench/data/sc_bench_benchmark.jsonl
        prompt_config: null
        prepare_script: benchmarks/sc_bench/prepare.py
        license: Apache 2.0
        num_repeats: 5
