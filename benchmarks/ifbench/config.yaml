# Chain to existing instruction_following resources server config
config_paths:
  - resources_servers/instruction_following/configs/instruction_following.yaml

# Override grading_mode to fraction so reward = fraction of instructions followed per response.
# IFBench's primary metric is average_score (avg fraction across runs), not binary pass/fail.
ifbench_instruction_following_resources_server:
  _inherit_from: instruction_following
  resources_servers:
    instruction_following:
      grading_mode: fraction

ifbench_instruction_following_simple_agent:
  _inherit_from: instruction_following_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: ifbench_instruction_following_resources_server
      datasets:
      - name: ifbench
        type: benchmark
        jsonl_fpath: benchmarks/ifbench/data/ifbench_benchmark.jsonl
        prepare_script: benchmarks/ifbench/prepare.py
        num_repeats: 5
