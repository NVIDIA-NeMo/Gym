# OpenSandbox sandbox provider config.
#
# `sandbox` is the instance name an agent references via `sandbox_provider:
# sandbox`; the child key `opensandbox` selects the provider class and its value
# is passed to the provider constructor.
#
# Every shipped provider config binds the same name `sandbox`, so swapping
# providers is swapping this config path in `+config_paths` (no agent edit):
#
#   AGENT=responses_api_agents/mini_swe_agent_2/configs/mini_swe_agent_2.yaml
#   MODEL=responses_api_models/vllm_model/configs/vllm_model.yaml
#   ng_run "+config_paths=[$AGENT, nemo_gym/sandbox/providers/opensandbox/configs/opensandbox.yaml, $MODEL]"
#
# To run multiple sandboxes at once, give each block a distinct instance name
# (e.g. `opensandbox_foo`, `opensandbox_baz`) and reference each by name.
#
# `default_metadata` (optional) is merged into every sandbox's spec metadata
# (SandboxSpec.metadata); an agent's own sandbox_spec.metadata overrides it.
sandbox:
  default_metadata:
    sandbox-api: opensandbox-sdk
  opensandbox:
    connection:
      domain: ${oc.env:OPENSANDBOX_DOMAIN,opensandbox-server.opensandbox-system.svc.cluster.local}
      api_key: ${oc.env:OPENSANDBOX_API_KEY}
      protocol: http
      request_timeout_s: 300
      use_server_proxy: true
      # Fresh connection per request. The server proxy is reached over a
      # cross-cluster istio east-west gateway fronted by an AWS NLB that
      # silently reaps idle pooled connections; reusing a reaped connection
      # hangs exec (observed as dozens of CLOSE_WAIT sockets wedging tasks,
      # while a fresh-connection exec returns in ~1s). Disabling keepalive
      # forces a fresh connection so no reaped socket is ever reused.
      disable_connection_pooling: true
    create:
      request_timeout_s: 1200
      timeout_s: 1200
      skip_health_check: true
      retries: 10
      retry_delay_s: 5.0
      retry_max_delay_s: 90.0
    probe:
      timeout_s: 60
      deadline_s: 180
      stable_count: 2
      stable_delay_s: 1.0
    operations:
      retries: 5
      retry_delay_s: 0.5
      # Fast retries: the transient errors on a cross-cluster/LB path (stale
      # half-closed connection reuse -> RemoteProtocolError, proxy 500) clear on
      # an immediate retry, so a long backoff just wastes wall-clock.
      retry_max_delay_s: 8.0
      command_retries: 3
      close_timeout_s: 30
      # Foreground (streaming SSE) exec is the default and matches the baseline
      # reproduction. `background_exec` runs the command in the background and
      # polls status/logs instead of holding one SSE stream open; it was added
      # for load balancers that cap long-lived streams, but it multiplies short
      # cross-cluster requests and (without `disable_connection_pooling`) churns
      # pooled connections. With fresh connections + short TB commands (<=180s,
      # well under any LB idle cap), foreground SSE is simpler and reliable.
      background_exec: false
      # Poll cadence when background_exec is enabled: fast at first (short tmux
      # commands finish in <1s) then back off.
      background_poll_initial_s: 0.25
      background_poll_interval_s: 2.0
