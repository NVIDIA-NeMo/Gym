customer_service_env:
  resources_servers:
    customer_service_env:
      entrypoint: app.py
      domain: agent
      verified: false
      description: Multi-turn customer service with asymmetric tool access. User model has private tools hidden from policy.
customer_service_gymnasium_agent:
  responses_api_agents:
    gymnasium_agent:
      entrypoint: app.py
      env_server:
        type: resources_servers
        name: customer_service_env
      model_server:
        type: responses_api_models
        name: policy_model
      max_steps: 10
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/customer_service_env/data/example.jsonl
user_model:
  responses_api_models:
    vllm_model:
      entrypoint: app.py
      base_url: ${policy_base_url}
      api_key: ${policy_api_key}
      model: ${policy_model_name}
      return_token_id_information: false
      uses_reasoning_parser: true
