wmt_translation:
  resources_servers:
    wmt_translation:
      entrypoint: app.py
      domain: other
      verified: false
      description: Machine-translation verifier computing corpus-level BLEU per language pair plus optional xCOMET-XXL neural QE via a Ray GPU actor.
      value: Improves multilingual translation quality across BLEU and COMET-family metrics.
      compute_comet: true
      comet_model: Unbabel/XCOMET-XXL
      comet_batch_size: 16
      # Full 1.0 GPU on a dedicated worker node. Gym rollout script requests
      # server_nodes=N+1 while vLLM's DP=N uses N nodes via strict-pack; the
      # extra node's 8 GPUs stay unclaimed in Ray's accounting, so this
      # task schedules there cleanly. See app.py / run_wmt24pp_gym.py.
      comet_num_gpus: 1

wmt_translation_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: wmt_translation
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/wmt_translation/data/example.jsonl
        num_repeats: 1
        license: Creative Commons Attribution Share Alike 4.0
