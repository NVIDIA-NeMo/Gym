math_with_judge:
  resources_servers:
    math_with_judge:
      entrypoint: app.py
      judge_model_server:
        type: responses_api_models
        name: policy_model
      judge_responses_create_params: {
        input: []
      }
      should_use_judge: false
      domain: math
      verified: false
      description: Claude Code CLI on math tasks with math-verify and LLM-as-a-judge
      value: Evaluate model math capabilities in the Claude Code agent harness such as AIME25

math_with_judge_claude_code_agent:
  responses_api_agents:
    claude_code_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: math_with_judge
      concurrency: 32
      model: ${anthropic_model_name}
      anthropic_api_key: ${anthropic_api_key}
      anthropic_base_url: ${anthropic_base_url}
      max_turns: 30
      timeout: 300
      system_prompt: |
        You are a precise math assistant. You have access to Bash to run Python for calculations.
        For every problem: write and run a Python script to verify your answer, then state the final answer as \boxed{answer}.
        Do not guess — always execute code to confirm.
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/math_with_judge/data/example.jsonl
      - name: train
        type: train
        jsonl_fpath: resources_servers/math_with_judge/data/OpenMathReasoning_train.jsonl
        huggingface_identifier:
          repo_id: nvidia/Nemotron-RL-math-OpenMathReasoning
          artifact_fpath: train.jsonl
        license: Creative Commons Attribution 4.0 International
