terminal_multi_harness_resources_server:
  resources_servers:
    terminal_multi_harness:
      entrypoint: app.py
      domain: agent
      tool_call_comparator_config:
        word_count_similarity_threshold: 0.1
        ignored_argument_keys_by_tool:
          exec_command:
          - max_output_tokens
          - yield_time_ms
          - login
          - tty
          - shell
          write_stdin:
          - max_output_tokens
