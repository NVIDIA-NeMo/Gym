---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-sandbox
  namespace: nemogym
  labels:
    app: k8s-sandbox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-sandbox-job-runner
  namespace: nemogym
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-sandbox-job-runner
  namespace: nemogym
subjects:
  - kind: ServiceAccount
    name: k8s-sandbox
    namespace: nemogym
roleRef:
  kind: Role
  name: k8s-sandbox-job-runner
  apiGroup: rbac.authorization.k8s.io
