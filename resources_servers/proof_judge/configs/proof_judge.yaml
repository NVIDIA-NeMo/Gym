# Proof judge resource: verifier + meta-verifier (DeepSeek Math style).
#
# Two judge modes:
#   A) Gym-internal: judge_model_server points to a Gym-managed vllm_model.
#      Use proof_judge_with_local_judge.yaml for this mode.
#   B) External (JUDGE_SERVER_ARGS): nemo-skill pipeline starts judge as SLURM het group;
#      proof_judge reads JUDGE_SERVER_ARGS env and calls judge via AsyncOpenAI.
#      judge_model_server.name is still required but acts as a fallback / placeholder.
#
# Default config: judge uses policy_model (same model for gen + judge).
# For external judge, the pipeline sets JUDGE_SERVER_ARGS env var, and proof_judge
# will route to the external servers automatically (no YAML changes needed).
proof_judge:
  resources_servers:
    proof_judge:
      entrypoint: app.py
      judge_model_server:
        type: responses_api_models
        name: policy_model
      judge_model_name: ""
      alpha: 1.0
      beta: 0.0
      temperature: 0.6
      top_p: 0.95
      max_tokens: 8192
      assert_think_end: false
      domain: math
      description: Theorem proving with verifier + meta-verifier judge

proof_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: proof_judge
      model_server:
        type: responses_api_models
        name: policy_model
      datasets: []
