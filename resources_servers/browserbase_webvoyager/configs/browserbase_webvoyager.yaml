browserbase_webvoyager_resources_server:
  resources_servers:
    browserbase_webvoyager:
      entrypoint: app.py
      domain: agent
      verified: false
      description: Browserbase-backed DOM web navigation tasks
browserbase_webvoyager_simple_agent:
