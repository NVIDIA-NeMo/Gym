      entrypoint: app.py
      max_steps: 12
      resources_server:
        type: resources_servers
        name: browserbase_webvoyager_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/browserbase_webvoyager/data/example.jsonl
