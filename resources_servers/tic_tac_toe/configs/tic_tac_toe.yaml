tic_tac_toe:
  resources_servers:
    tic_tac_toe:
      entrypoint: app.py
      domain: games
      verified: false
      description: Tic-tac-toe game using multi-turn agent
tic_tac_toe_multi_turn_agent:
  responses_api_agents:
    multi_turn_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: tic_tac_toe
      model_server:
        type: responses_api_models
        name: policy_model
      user_model_server:
        type: responses_api_models
        name: user_model
      max_turns: 5
      max_steps_per_turn: null
      user_model_system_prompt: >-
        You are playing tic-tac-toe as O against an opponent (X).
        Use the make_move tool to place your O mark on the board.
        Positions are 0-8, numbered left to right, top to bottom.
        Think strategically about your moves. After placing your mark,
        briefly comment on the game state and encourage your opponent
        to make their next move.
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/tic_tac_toe/data/example.jsonl
