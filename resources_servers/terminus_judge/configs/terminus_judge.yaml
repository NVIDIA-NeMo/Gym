terminus_judge_resources_server:
  resources_servers:
    terminus_judge:
      entrypoint: app.py
      judge_model_server:
        type: responses_api_models
        name: judge_model
      judge_responses_create_params:
        input: []
      judge_prompt_template_fpath: prompt_templates/rubrics_v4.txt
      judge_endpoint_max_concurrency: null
      judge_system_message: null
      judge_equal_label: '[[A=B]]'
      judge_not_equal_label: '[[A!=B]]'
      check_twice_swap: false
      reward_if_swap_fails: 0.0
      enable_string_similarity: true
      string_similarity_threshold: 0.95
      enable_llm_judge: true
      domain: agent
      verified: false
      description: single-step terminal based task (rubrics v4 judge prompt)
      value: Improve on terminal-style tasks
