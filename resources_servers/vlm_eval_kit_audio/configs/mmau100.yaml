# 100 real MMAU audio samples as a local validation dataset (no download).
vlm_eval_kit_audio_resources_server:
  resources_servers:
    vlm_eval_kit_audio:
      entrypoint: app.py
      domain: other
      verified: false
      description: Generic VLMEvalKit driver (audio-first) — MMAU 100-sample run.
      value: Measure audio-capable model performance on VLMEvalKit benchmarks
vlm_eval_kit_audio_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: vlm_eval_kit_audio_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: mmau100
        type: validation
        jsonl_fpath: resources_servers/vlm_eval_kit_audio/data/mmau100_validation.jsonl
        num_repeats: 1
        license: TBD
