# 5 real MMAU audio samples as a local "validation" dataset (no gitlab_identifier
# -> no download). For the kick-off demo: real audio-understanding questions
# through the generic driver against the hosted Inference Hub Omni model.
# Data file (gitignored, *validation.jsonl) is produced by staging 5 real MMAU
# samples (see prepare_data.py or your dataset staging script).
vlm_eval_kit_audio_resources_server:
  resources_servers:
    vlm_eval_kit_audio:
      entrypoint: app.py
      domain: other
      verified: false
      description: Generic VLMEvalKit driver (audio-first) — MMAU 5-sample demo.
      value: Measure Omni (audio) model capabilities via VLMEvalKit benchmarks
vlm_eval_kit_audio_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: vlm_eval_kit_audio_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: mmau5
        type: validation
        jsonl_fpath: resources_servers/vlm_eval_kit_audio/data/mmau5_validation.jsonl
        num_repeats: 1
        license: TBD
