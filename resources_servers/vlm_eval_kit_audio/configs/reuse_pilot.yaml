# Pilot B (reuse): OCRBench_v2 + CharXiv subsamples staged via native mcore
# build_dataset/build_prompt. Rollout collection only — pilot scoring runs
# offline via reuse_scoring.py (native mcore rule-engine / judge prompt).
vlm_eval_kit_audio_resources_server:
  resources_servers:
    vlm_eval_kit_audio:
      entrypoint: app.py
      domain: other
      verified: false
      description: Generic VLMEvalKit driver — reuse pilot (OCRBench_v2 + CharXiv).
      value: Measure omni model performance on VLMEvalKit benchmarks
vlm_eval_kit_audio_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: vlm_eval_kit_audio_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: ocrbenchv2
        type: validation
        jsonl_fpath: resources_servers/vlm_eval_kit_audio/data/ocrbenchv2_validation.jsonl
        num_repeats: 1
        license: TBD
      - name: charxiv
        type: validation
        jsonl_fpath: resources_servers/vlm_eval_kit_audio/data/charxiv_validation.jsonl
        num_repeats: 1
        license: TBD
