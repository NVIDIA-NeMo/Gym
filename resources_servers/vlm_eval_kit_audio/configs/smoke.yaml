# Smoke config: runs the self-contained example.jsonl (audio) as a local
# "validation" dataset (no gitlab_identifier -> no download), so `gym eval run
# --split validation` works end-to-end without staging MMAU or GitLab creds.
vlm_eval_kit_audio_resources_server:
  resources_servers:
    vlm_eval_kit_audio:
      entrypoint: app.py
      domain: other
      verified: false
      description: Generic VLMEvalKit driver (audio-first) — smoke.
      value: Measure Omni (audio) model capabilities via VLMEvalKit benchmarks
vlm_eval_kit_audio_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: vlm_eval_kit_audio_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: audio_smoke
        type: validation
        jsonl_fpath: resources_servers/vlm_eval_kit_audio/data/example.jsonl
        num_repeats: 1
        license: TBD
