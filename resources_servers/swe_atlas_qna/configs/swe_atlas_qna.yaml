# SWE-Atlas Codebase QnA rubric-judge resources server.
#
# The judge model is pulled from env vars so the same config works against any
# OpenAI-compatible endpoint — swap via ``SWE_ATLAS_QNA_JUDGE_*`` overrides (or
# set the env vars at launch). The ``MISSING`` fallback keeps config-load green
# for judge-unrelated commands (``gym env resolve``, ``gym dataset collate``,
# ``gym env test``); live ``verify()`` calls fail loudly if the key is unset.
#
# For a Gym-managed local judge instead of a hosted API, replace the
# ``swe_atlas_qna_judge_model`` block below with a ``local_vllm_model`` block
# (see resources_servers/math_with_judge/configs/math_with_local_judge.yaml).

swe_atlas_qna_judge_model:
  responses_api_models:
    openai_model:
      entrypoint: app.py
      openai_base_url: ${oc.env:SWE_ATLAS_QNA_JUDGE_BASE_URL,MISSING}
      openai_api_key: ${oc.env:SWE_ATLAS_QNA_JUDGE_API_KEY,MISSING}
      openai_model: ${oc.env:SWE_ATLAS_QNA_JUDGE_MODEL,MISSING}

# Resources server: owns Codebase QnA rubric grading (verify()) and reward.
swe_atlas_qna_resources_server:
  resources_servers:
    swe_atlas_qna:
      entrypoint: app.py
      domain: knowledge
      verified: false
      description: SWE-Atlas Codebase QnA rubric LLM-judge — grades a codebase answer against per-task expert rubrics (all-must-have pass)
      value: Evaluate deep codebase comprehension via rubric-based LLM judging
      judge_model_server:
        type: responses_api_models
        name: swe_atlas_qna_judge_model
      # The judge is called via /v1/chat/completions — the most universally
      # supported endpoint across OpenAI-compatible providers for a short verdict.
      judge_chat_completions_create_params:
        messages: []
        # Judge outputs are short (per-rubric YES/NO + justification). 2048
        # matches upstream evaluate_answer.py's MAX_TOKENS.
        max_tokens: 2048
        # Deterministic grading. Leave top_p unset — some judge endpoints reject
        # requests that set both temperature and top_p.
        temperature: 0.0
      judge_system_prompt_path: resources_servers/swe_atlas_qna/prompts/judge_system.txt
      judge_user_template_path: resources_servers/swe_atlas_qna/prompts/judge_user_template.txt
      judge_max_retries: 8
      judge_max_concurrency: 16

# Single-turn agent pairing — a smoke-test harness that asks the policy model the
# codebase question directly (no sandbox) and grades the answer. The real
# benchmark uses the mini-swe-agent QnA harness (added separately); swap the
# agent here once that harness lands.
swe_atlas_qna_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: swe_atlas_qna_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
        - name: example
          type: example
          jsonl_fpath: resources_servers/swe_atlas_qna/data/example.jsonl
