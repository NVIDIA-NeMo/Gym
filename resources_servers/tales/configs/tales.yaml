tales:
  resources_servers:
    tales:
      entrypoint: app.py
      domain: games
      verified: false
      description: TALES text-adventure games (textworld, textworld_express, alfworld, scienceworld, jericho) in Gymnasium API style.
      value: Multi-turn reasoning and progress through open-ended, situated text environments.
      expose_admissible_commands: false
      # Default values below. Per-task framework/task_no/split/seed/max_episode_steps come from the dataset row.
      framework: textworld
      task_no: 0
      seed: 0
      split: train
      # 100 matches the TALES paper protocol (arXiv:2504.14128 §4); rows may override per task.
      max_episode_steps: 100
tales_gymnasium_agent:
  responses_api_agents:
    gymnasium_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: tales
      model_server:
        type: responses_api_models
        name: policy_model
      # Agent loop cap binds before the server's max_episode_steps — keep >= the row cap (paper: 100).
      max_steps: 100
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/tales/data/example.jsonl
        num_repeats: 1
        license: Apache 2.0
