reasoning_gym_env:
  resources_servers:
    reasoning_gym_env:
      entrypoint: app.py
      domain: knowledge
      verified: false
      description: reasoning_gym reimplemented as a Gymnasium-style Env.
reasoning_gym_gymnasium_agent:
  responses_api_agents:
    gymnasium_agent:
      entrypoint: app.py
      env_server:
        type: resources_servers
        name: reasoning_gym_env
      model_server:
        type: responses_api_models
        name: policy_model
      max_steps: 1
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/reasoning_gym/data/example.jsonl
