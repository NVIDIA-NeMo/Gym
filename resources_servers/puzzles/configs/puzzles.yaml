puzzles:
  resources_servers:
    puzzles:
      entrypoint: app.py
      domain: games
      verified: false
      description: Logic puzzle verification (dict_match, boxed, python_block, etc.), ported from NeMo-RLVR's puzzles_environment.
      value: Train models on logic puzzles (zebralogic, sudoku, scheduling, sequence puzzles) with structured-answer extraction and comparison.
puzzles_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: puzzles
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/puzzles/data/example.jsonl
