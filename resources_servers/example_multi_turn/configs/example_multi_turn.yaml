example_multi_turn:
  resources_servers:
    example_multi_turn:
      entrypoint: app.py
      domain: games
      verified: false
      description: Multi-turn interaction with LLM user model (tic-tac-toe)
example_multi_turn_agent:
  responses_api_agents:
    multi_turn_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: example_multi_turn
      model_server:
        type: responses_api_models
        name: policy_model
      user_model_server:
        type: responses_api_models
        name: user_model
      max_turns: 5
      max_steps_per_turn: 1
      user_model_tool_choice: required
      user_model_stop_token: '"game_over":true'
      user_model_system_prompt: >-
        You are playing tic-tac-toe as O against an opponent (X).
        Use the make_move tool to place your O mark on the board.
        Positions are 0-8, numbered left to right, top to bottom.
        Think strategically about your moves.
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/example_multi_turn/data/example.jsonl
