grl_sokoban:
  resources_servers:
    grl_sokoban:
      entrypoint: app.py
      domain: games
      verified: false
      description: Single-box Sokoban in Gymnasium API style.
      value: Model emits one move per turn until the puzzle is solved.
grl_sokoban_gymnasium_agent:
  responses_api_agents:
    gymnasium_agent:
      entrypoint: app.py
      env_server:
        type: resources_servers
        name: grl_sokoban
      model_server:
        type: responses_api_models
        name: policy_model
      max_steps: 20
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/grl_sokoban/data/example.jsonl
        num_repeats: 1
        gitlab_identifier:
          dataset_name: grl_sokoban
          version: 0.0.1
          artifact_fpath: example.jsonl
        license: Apache 2.0
