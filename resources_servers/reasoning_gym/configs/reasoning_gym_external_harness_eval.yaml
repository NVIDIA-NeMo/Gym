policy_model:
  responses_api_models:
    vllm_model:
      entrypoint: app.py
      base_url: ${policy_base_url}
      api_key: ${policy_api_key}
      model: ${policy_model_name}
      uses_reasoning_parser: false
      return_token_id_information: false
      observability:
        enabled: true
        capture_dir: ng_captures
        run_id: workstation
        return_token_ids: false
reasoning_gym:
  resources_servers:
    reasoning_gym:
      entrypoint: app.py
      domain: knowledge
      verified: false
external_harness_agent:
  responses_api_agents:
    external_harness:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: reasoning_gym
      model_server:
        type: responses_api_models
        name: policy_model
      policy_model_name: ${policy_model_name}
      settings:
        harness: claude_code
        builder: prefix_merging
        training_mode: false
        sandbox_provider:
          docker: {}
        sandbox_spec:
          image: node:20-bookworm-slim
          workdir: /tmp/nemo-gym-harness
          provider_options:
            run_args: ["--network", "host"]
        harness_spec:
          pinned_version: null
          max_output_tokens: 2048
          bare: false
          system_prompt_append: 'You are a precise reasoning assistant. You have access
            to Bash to run Python for calculations.

            For every problem: think step by step, use code to verify when helpful,
            and put your final

            answer inside \boxed{...}.

            '
      datasets:
      - name: rg_smoke
        type: validation
        license: MIT
        jsonl_fpath: resources_servers/reasoning_gym/data/rg_smoke_validation.jsonl
