rdkit_chemistry:
  resources_servers:
    rdkit_chemistry:
      entrypoint: app.py
      domain: knowledge
      verified: false
      description: >
        Verifiable chemistry question answering.
        The agent receives a natural-language chemistry question + SMILES and
        must respond with a single number or binary flag.  All questions are
        derived from RDKit-computable properties over the ChEMBL database.
        Rows with method=mcp-python include tool definitions for sandboxed
        Python/RDKit execution; rows with method=direct do not.
      value: Train models to answer quantitative chemistry questions about molecules
      sandbox_venv_path: ${oc.env:SANDBOX_VENV_PATH,''}
      sandbox_extra_packages:
        - rdkit
        - flask
        - wcwidth
      sandbox_discovery_path: ${oc.env:SANDBOX_DISCOVERY_PATH,''}

rdkit_chemistry_ns_tools:
  resources_servers:
    ns_tools:
      entrypoint: app.py
      default_verifier: rdkit_chemistry
      verifiers:
        rdkit_chemistry:
          type: resources_servers
          name: rdkit_chemistry
      nemo_skills_tools:
        - nemo_skills.mcp.servers.python_tool.PythonTool
      nemo_skills_tool_overrides:
        PythonTool:
          exec_timeout_s: 10
      sandbox_host: ${oc.env:NEMO_SKILLS_SANDBOX_HOST,127.0.0.1}
      sandbox_port: ${oc.env:NEMO_SKILLS_SANDBOX_PORT,6000}
      disable_session_restore: true
      domain: agent
      verified: false
      description: ns_tools wrapper for rdkit_chemistry with Python tool-use

rdkit_chemistry_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      max_steps: 10
      resources_server:
        type: resources_servers
        name: rdkit_chemistry_ns_tools
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
        - name: train
          type: train
          jsonl_fpath: resources_servers/rdkit_chemistry/data/train.jsonl
          license: "TBD"
        - name: validation
          type: validation
          jsonl_fpath: resources_servers/rdkit_chemistry/data/validation.jsonl
          license: "TBD"
        - name: example
          type: example
          jsonl_fpath: resources_servers/rdkit_chemistry/data/example.jsonl
