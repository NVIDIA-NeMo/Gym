single_step_tool_use_with_argument_comparison_resources_server:
  resources_servers:
    single_step_tool_use_with_argument_comparison:
      entrypoint: app.py
      domain: agent
      tool_call_comparator_config:
        word_count_similarity_threshold: 0.1
      verified: false
      description: GitHub-issue dataset for software-engineering agents; refactored from SWE-Gym and SWE-Bench-Verified for NeMo Gym.
single_step_tool_use_with_argument_comparison_agent:
  responses_api_agents:
    tool_simulation_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: single_step_tool_use_with_argument_comparison_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: train
        type: train
        jsonl_fpath: resources_servers/single_step_tool_use_with_argument_comparison/data/train.jsonl
        num_repeats: 1
        huggingface_identifier:
          repo_id: nvidia/Nemotron-RL-SWE-Pivot-v1
          artifact_fpath: train.jsonl