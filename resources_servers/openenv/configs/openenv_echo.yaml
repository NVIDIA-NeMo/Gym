openenv_echo_resources_server:
  resources_servers:
    openenv:
      entrypoint: app.py
      domain: agent
      verified: false
      description: Echo environment via OpenEnv (MCP). Echoes messages back with length-based
        rewards.
      env_class: echo_env.server.echo_environment.EchoEnvironment
      action_class: openenv.core.env_server.mcp_types.CallToolAction
      is_mcp: true
