# Arena Hard v2 pairwise-judge resources server.
#
# Judge calls hit the NVIDIA inference-api by default (Claude Opus via
# Bedrock). Override via env.yaml / CLI if you want a different endpoint
# — e.g. self-hosted vLLM for CI or air-gapped runs.

# Judge model server — routes verify() calls to inference-api.nvidia.com.
# ``${oc.env:VAR,default}`` pulls from the submitting process env with a
# fallback so config-load never fails for judge-unrelated jobs (prepare,
# ng_dump_config, ng_test). The ``MISSING`` fallback means the judge will
# only error at call time if the key actually isn't set.
arena_judge_judge_model:
  responses_api_models:
    openai_model:
      entrypoint: app.py
      openai_base_url: ${oc.env:ARENA_JUDGE_BASE_URL,https://inference-api.nvidia.com/v1}
      openai_api_key: ${oc.env:NVIDIA_INFERENCE_API_KEY,MISSING}
      openai_model: ${oc.env:ARENA_JUDGE_MODEL,aws/anthropic/bedrock-claude-opus-4-6}

arena_judge:
  resources_servers:
    arena_judge:
      entrypoint: app.py
      domain: other
      verified: false
      description: Arena Hard v2 pairwise LLM-judge server — ports arena-hard-auto's category-specific judging with side-swapped prompts
      value: Evaluate open-ended generation quality via pairwise comparison against a fixed baseline
      judge_model_server:
        type: responses_api_models
        name: arena_judge_judge_model
      # ChatCompletion (NOT Responses API) — inference-api.nvidia.com's
      # Bedrock proxy returns ``object: "chat.completion"`` from
      # /v1/responses, which fails NeMoGymResponse validation. See
      # app.py::_judge_once for the full context.
      judge_chat_completions_create_params:
        messages: []
        # Judge outputs are short (verdict + brief justification). 4k is
        # enough headroom for the judge to write its own answer first
        # (required by the `hard_prompt` prompt) before voting.
        max_tokens: 4096
        # Temperature only — Bedrock (bedrock-claude-opus-4-6 via
        # inference-api.nvidia.com) rejects requests that specify BOTH
        # temperature and top_p. Matches the Skills baseline's
        # extra_judge_args=++inference.top_p=null.
        temperature: 0.0
      judge_prompt_paths:
        hard_prompt: resources_servers/arena_judge/prompts/arena.yaml
        creative_writing: resources_servers/arena_judge/prompts/arena_creative.yaml
      default_category: hard_prompt

arena_judge_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: arena_judge
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
        - name: example
          type: example
          jsonl_fpath: resources_servers/arena_judge/data/example.jsonl
          license: Apache 2.0
