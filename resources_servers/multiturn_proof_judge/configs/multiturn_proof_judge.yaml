# Multi-turn proof judge resource: verifier + meta-verifier with multi-turn support.
#
# Extends proof_judge with:
#   - Multi-turn awareness (turn_index tracking, reprompt building)
#   - Summary model support (response_processor: summary_model)
#   - Reprompt templates (prover_reprompt, prover_reprompt_truncated, prover_summary)
#
# Judge modes (same as proof_judge):
#   A) Gym-internal: judge_model_server points to a Gym-managed vllm_model.
#   B) External (JUDGE_SERVER_ARGS): nemo-skill pipeline starts judge as SLURM het group.
multiturn_proof_judge:
  resources_servers:
    multiturn_proof_judge:
      entrypoint: app.py
      judge_model_server:
        type: responses_api_models
        name: policy_model
      judge_model_name: ""
      alpha: 1.0
      beta: 0.0
      temperature: 0.6
      top_p: 0.95
      max_tokens: 100000
      assert_think_end: false
      max_turns: 2
      reward_strategy: final_only
      response_processor: strip_thinking
      zero_truncated_turn_reward: false
      truncated_turn_reward_share: 1.0
      domain: math
      description: Multi-turn theorem proving with verifier + meta-verifier judge

multiturn_proof_agent:
  responses_api_agents:
    multiturn_proof_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: multiturn_proof_judge
      model_server:
        type: responses_api_models
        name: policy_model
      max_turns: 2
      response_processor: strip_thinking
      include_all_attempts: true
      max_output_tokens: null
      summary_max_output_tokens: null
      datasets: []
