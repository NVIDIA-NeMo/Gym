physics_with_judge:
  resources_servers:
    physics_with_judge:
      entrypoint: app.py
      judge_model_server:
        type: responses_api_models
        name: policy_model
      judge_responses_create_params: {
        input: []
      }
      should_use_judge: false
      # Relative tolerance for numerical comparison (0.1 % default)
      rtol: 1.0e-3
      domain: other
      verified: false
      description: Physics answer verification with pint unit conversion and optional LLM judge

physics_with_judge_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: physics_with_judge
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/physics_with_judge/data/example.jsonl
