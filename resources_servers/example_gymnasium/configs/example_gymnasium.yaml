example_gymnasium:
  resources_servers:
    example_gymnasium:
      entrypoint: __init__.py
      domain: other
      verified: false
      description: Base class for Gymnasium-style servers. Not a standalone server.
example_gymnasium_agent:
  responses_api_agents:
    gymnasium_agent:
      entrypoint: app.py
      env_server:
        type: resources_servers
        name: example_gymnasium
      model_server:
        type: responses_api_models
        name: policy_model
      max_steps: 1
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/example_gymnasium/data/example.jsonl
