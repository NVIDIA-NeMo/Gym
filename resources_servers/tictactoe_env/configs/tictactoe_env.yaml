tictactoe_env:
  resources_servers:
    tictactoe_env:
      entrypoint: app.py
      domain: games
      verified: false
      description: TicTacToe. Model plays X against an LLM opponent (O).
tictactoe_gymnasium_agent:
  responses_api_agents:
    gymnasium_agent:
      entrypoint: app.py
      env_server:
        type: resources_servers
        name: tictactoe_env
      model_server:
        type: responses_api_models
        name: policy_model
      max_steps: 9
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/tictactoe_env/data/example.jsonl
tictactoe_user_model:
  responses_api_models:
    vllm_model:
      entrypoint: app.py
      base_url: ${policy_base_url}
      api_key: ${policy_api_key}
      model: ${policy_model_name}
      return_token_id_information: false
      uses_reasoning_parser: true
