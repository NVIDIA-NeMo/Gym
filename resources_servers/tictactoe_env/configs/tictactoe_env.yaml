tictactoe_env:
  resources_servers:
    tictactoe_env:
      entrypoint: app.py
      domain: games
      verified: false
      description: TicTacToe. Model plays X against a rule-based opponent. Reward +1 win, 0 draw, -1 loss.
tictactoe_env_agent:
  responses_api_agents:
    env_agent:
      entrypoint: app.py
      env_server:
        type: resources_servers
        name: tictactoe_env
      model_server:
        type: responses_api_models
        name: policy_model
      max_steps: 9
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/tictactoe_env/data/example.jsonl
