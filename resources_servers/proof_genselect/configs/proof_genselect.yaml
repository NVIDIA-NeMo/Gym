# Pairwise proof-selection environment with binary reward.
proof_genselect:
  resources_servers:
    proof_genselect:
      entrypoint: app.py
      assert_think_end: false
      domain: math
      description: Pairwise proof selection with binary correctness reward

proof_genselect_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: proof_genselect
      model_server:
        type: responses_api_models
        name: policy_model
      datasets: []
