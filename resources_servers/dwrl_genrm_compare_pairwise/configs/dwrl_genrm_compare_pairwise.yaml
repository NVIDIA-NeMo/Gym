# GenRM Pairwise Comparison Resources Server Config
#
# This server compares multiple candidate responses using a GenRM model.
# The GenRM model uses a special chat template with roles 'response_1', 'response_2',
# and optionally 'principle' (see use_principle and default_principle below).
#
# The GenRM model server is defined by the top-level "genrm_model" block below (same
# structure as responses_api_models/genrm_model/configs/genrm_model.yaml). Override
# genrm_model_server.name to use a different model server (e.g. from another config).
#
# Expected GenRM output format (JSON):
# {
#     "score_1": <1-5>,  # Individual helpfulness score for response 1
#     "score_2": <1-5>,  # Individual helpfulness score for response 2
#     "ranking": <1-6>   # 1=R1 much better, 6=R2 much better
# }

dwrl_pairwise_compare_resources_server:
  resources_servers:
    dwrl_genrm_compare_pairwise:
      entrypoint: app.py
      
      # GenRM model server: points to the "genrm_model" block above (or another config with that name)
      genrm_model_server:
        type: responses_api_models
        name: dwrl_model
      
      # Cohort-based verify (Difference 1): number of rollouts per prompt before running comparison.
      # When > 1, verify() buffers by prompt and returns relative rewards when cohort is full.
      # Ensure rollout data has this many rows per prompt (e.g. num_repeats in rollout collection).
      num_rollouts_per_prompt: 16
      
      # Generation params for GenRM calls
      genrm_responses_create_params:
        messages: []
        max_tokens: 16384
        temperature: 1.0
        top_p: 0.95
      
      # Comparison strategy: "all_pairs" (C(n,2) comparisons) or "circular" (n comparisons)
      comparison_strategy: circular
      
      # Number of judge passes per pair (for majority voting)
      num_judges_per_comparison: 1
      
      # Principle-based comparison
      use_principle: false
      # default_principle: "..." (see code for full default text)
      
      # Aggregator method (only "simple_tiebreaker" is currently supported)
      aggregator_method: simple_tiebreaker
      
      # Bonus for shortest reasoning trace if in top percentile
      reasoning_bonus: 0.0
      # Bonus for shortest final answer if in top percentile
      answer_bonus: 0.0
      # Top percentile threshold (e.g., 0.2 = top 20%)
      top_percentile: 0.2
      # Group-relative length penalty coefficients
      # Shorter responses get bonus, longer get penalty (mean-centered)
      group_reasoning_length_penalty_coeff: 0.0
      group_answer_length_penalty_coeff: 0.0
      
      # Default scores when parsing fails
      default_score: 3.0
      default_ranking: 3.5
      
      # DWRL-specific
      bt_prompt: "Based on your evaluation, which response is better? Answer with only a single character: 1 or 2"
      score_token: "1"
      
      # Debug logging
      debug_logging: false
      
      # Parse retry configuration
      genrm_parse_retries: 3
      genrm_parse_retry_sleep_s: 0.2
      
      # Server metadata
      domain: rlhf
      verified: false
      description: GenRM pairwise comparison for RLHF training
      value: Compare multiple candidate responses using GenRM model
      
      dwrl_prompt: |
        You are an expert evaluation judge specializing in comparative assessment of LLM responses. You are impartial, rigorous, and consistent. Given the conversation context and two assistant responses to the user's latest query, you will follow the evaluation plan and scoring guidelines exactly as written below.
        
        #### Conversation Context ####
        {context}
        
        #### Responses to be Scored ####
        [The Start of Response 1]
        {response_1}
        [The End of Response 1]
        
        [The Start of Response 2]
        {response_2}
        [The End of Response 2]
        
        Please act as an impartial judge and evaluate the quality of the responses provided by two AI assistants to the user prompt. Begin your evaluation by generating your own answer to the prompt. You must provide your answer before judging any answers. When evaluating the assistants' answers, compare both assistants' answers with your answer. You must identify and correct any mistakes or inaccurate information. Then consider if the assistant's answers are helpful, relevant, and concise. Helpful means the answer correctly responds to the prompt or follows the instructions. Note when user prompt has any ambiguity or more than one interpretation, it is more helpful and appropriate to ask for clarifications or more information from the user than providing an answer based on assumptions. Relevant means all parts of the response closely connect or are appropriate to what is being asked. Concise means the response is clear and not verbose or excessive. Then consider the creativity and novelty of the assistant's answers when needed. Finally, identify any missing important information in the assistants' answers that would be beneficial to include when responding to the user prompt.
        
        #### Scoring Guidelines ####
        Based on the evaluation plan above, assign scores using these scales:
        **Individual Helpfulness Scores (1-5):**
        - 5: Extremely Helpful - Completely aligned with what the user was asking for
        - 4: Mostly Helpful - Generally useful with minor room for improvement
        - 3: Partially Helpful - Misses the overall goal in some way
        - 2: Borderline Unhelpful - Mostly doesn't capture what the user wanted
        - 1: Not Helpful - Completely missed the essence of the request
        
        **Comparative Ranking (1-6):**
        - 1: Response 1 is much better than Response 2
        - 2: Response 1 is better than Response 2
        - 3: Response 1 is slightly better than Response 2
        - 4: Response 2 is slightly better than Response 1
        - 5: Response 2 is better than Response 1
        - 6: Response 2 is much better than Response 1
        
        #### Output Format ####
        Analyze step by step following the evaluation plan, then provide your judgment as JSON:
        ```json
        {{
            "response_1_analysis": "Your detailed analysis of Response 1 based on the evaluation plan",
            "response_2_analysis": "Your detailed analysis of Response 2 based on the evaluation plan",
            "score_1": <1-5>,
            "score_2": <1-5>,
            "ranking": <1-6>
        }}
        ```

# GenRM model server (local vLLM). Same structure as responses_api_models/genrm_model/configs/genrm_model.yaml.
# Uses ${genrm_model_name} from env. Load this block when running genrm_compare, or load that file instead.
dwrl_model:
  responses_api_models:
    vllm_model:
      entrypoint: app.py
      base_url: ${genrm_base_url}
      api_key: xxx
      model: model
      return_token_id_information: false
      #supports_principle_role: true
      uses_reasoning_parser: false
      uses_interleaved_reasoning: true
      chat_template_kwargs: null
      extra_body: null
      default_headers: {}

genrm_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: dwrl_pairwise_compare_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/genrm_compare/data/example.jsonl
