<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1010" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#52514e"/>
    </marker>
  </defs>
  <style>
    .title{font-size:20px;font-weight:700;fill:#0b0b0b}
    .lane{font-size:12px;font-weight:700;letter-spacing:.08em;fill:#52514e}
    .boxT{font-size:13.5px;font-weight:600;fill:#0b0b0b}
    .body{font-size:12px;fill:#52514e}
    .mono{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:12px;fill:#0b0b0b}
    .monoS{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11px;fill:#52514e}
    .tag{font-size:10px;font-weight:600;fill:#0b0b0b}
    .lbl{font-size:11px;fill:#52514e}
    .muted{font-size:11px;fill:#7a7873}
    .arrow{stroke:#52514e;stroke-width:1.5;fill:none;marker-end:url(#arr)}
    .boxNew{fill:#eaf2fc;stroke:#2a78d6;stroke-width:1.5}
    .boxOld{fill:#ffffff;stroke:#9a9891;stroke-width:1.5}
    .boxMod{fill:#fdf1df;stroke:#d98600;stroke-width:1.5}
    .chipNew{fill:#eaf2fc;stroke:#2a78d6;stroke-width:1.2}
    .chipOld{fill:#ffffff;stroke:#9a9891;stroke-width:1.2}
    .chipMod{fill:#fdf1df;stroke:#d98600;stroke-width:1.2}
  </style>

  <!-- surface -->
  <rect x="0" y="0" width="1240" height="1010" fill="#fcfcfb"/>
  <rect x="788" y="96" width="432" height="560" rx="10" fill="#f4f3f0"/>

  <text x="40" y="44" class="title">gym eval reverify — where the new code plugs in</text>

  <!-- legend -->
  <rect x="40" y="60" width="14" height="14" rx="3" class="chipNew"/>
  <text x="60" y="72" class="lbl">new code</text>
  <rect x="140" y="60" width="14" height="14" rx="3" class="chipMod"/>
  <text x="160" y="72" class="lbl">modified code (new code in an existing file)</text>
  <rect x="420" y="60" width="14" height="14" rx="3" class="chipOld"/>
  <text x="440" y="72" class="lbl">existing code</text>

  <!-- lane headers -->
  <text x="40" y="118" class="lane">CLI PROCESS — gym eval reverify</text>
  <text x="804" y="118" class="lane">SERVER SUBPROCESSES (FastAPI)</text>

  <!-- B1 entry -->
  <rect x="40" y="132" width="700" height="58" rx="8" class="boxMod"/>
  <text x="56" y="154" class="boxT">command entry</text>
  <rect x="530" y="142" width="196" height="18" rx="9" class="chipMod"/>
  <text x="628" y="155" class="tag" text-anchor="middle">MODIFIED · cli/main.py</text>
  <text x="56" y="176" class="mono">main() → COMMANDS["eval reverify"]</text>

  <path class="arrow" d="M390,190 L390,222"/>
  <text x="404" y="210" class="lbl">single mode — no --no-serve flag</text>

  <!-- B2 target -->
  <rect x="40" y="226" width="700" height="84" rx="8" class="boxMod"/>
  <text x="56" y="248" class="boxT">reverify_rollouts</text>
  <rect x="536" y="236" width="190" height="18" rx="9" class="chipMod"/>
  <text x="631" y="249" class="tag" text-anchor="middle">MODIFIED · cli/eval.py</text>
  <text x="56" y="274" class="body">parse --config + ++ overrides</text>
  <text x="56" y="294" class="body">(the same config files previously used for gym env start work too)</text>

  <path class="arrow" d="M210,310 L210,342"/>

  <!-- B3 RunHelper.start (existing) -->
  <rect x="40" y="346" width="360" height="72" rx="8" class="boxOld"/>
  <text x="56" y="368" class="boxT">RunHelper.start</text>
  <rect x="240" y="356" width="150" height="18" rx="9" class="chipOld"/>
  <text x="315" y="369" class="tag" text-anchor="middle">existing · cli/env.py</text>
  <text x="56" y="392" class="body">starts only the resources server(s)</text>

  <path class="arrow" d="M404,382 L796,382"/>
  <text x="590" y="374" class="lbl" text-anchor="middle">start subprocesses</text>

  <path class="arrow" d="M210,418 L210,446"/>

  <!-- B4 RolloutReverifyHelper -->
  <rect x="40" y="450" width="700" height="282" rx="8" class="boxNew"/>
  <text x="56" y="474" class="boxT">RolloutReverifyHelper.run_from_config</text>
  <rect x="426" y="460" width="300" height="18" rx="9" class="chipNew"/>
  <text x="576" y="473" class="tag" text-anchor="middle">NEW · nemo_gym/rollout_reverification.py</text>
  <text x="64" y="506" class="mono">1  load rollouts_materialized_inputs + rollouts</text>
  <text x="64" y="532" class="mono">2  join on (_ng_task_index, _ng_rollout_index)</text>
  <text x="64" y="558" class="mono">3  if needed: subset rows with judge failures, copy the rest first</text>
  <text x="64" y="584" class="mono">4  route per agent_ref group → its resources_server ref</text>
  <text x="64" y="610" class="mono">5  prepare the payload</text>
  <text x="64" y="636" class="mono">6  POST /verify per row</text>
  <text x="64" y="662" class="mono">7  write output</text>
  <text x="64" y="696" class="muted">structured like RolloutCollectionHelper.run_from_config —</text>
  <text x="64" y="714" class="muted">some steps will live in helper methods, not one block of code</text>

  <!-- per-row HTTP arrow to S1 -->
  <path class="arrow" d="M740,570 L760,570 L760,420 L796,420"/>
  <text x="753" y="500" class="muted" transform="rotate(-90 753 500)" text-anchor="middle">/verify (per row)</text>

  <path class="arrow" d="M390,732 L390,756"/>

  <!-- B5 aggregate (existing) -->
  <rect x="40" y="760" width="420" height="58" rx="8" class="boxOld"/>
  <text x="56" y="782" class="boxT">_call_aggregate_metrics</text>
  <rect x="204" y="792" width="240" height="18" rx="9" class="chipOld"/>
  <text x="324" y="805" class="tag" text-anchor="middle">existing · rollout_collection.py</text>
  <path class="arrow" d="M460,789 L772,789 L772,445 L796,445"/>
  <text x="783" y="600" class="muted" transform="rotate(-90 783 600)" text-anchor="middle">/aggregate_metrics</text>

  <!-- S1 resources server -->
  <rect x="800" y="340" width="400" height="106" rx="8" class="boxOld"/>
  <text x="816" y="362" class="boxT">RESOURCES SERVER(S)</text>
  <text x="1184" y="362" class="muted" text-anchor="end">existing</text>
  <text x="816" y="390" class="monoS">POST /verify  →  verify()</text>
  <text x="816" y="410" class="monoS">POST /aggregate_metrics</text>

  <!-- S2 judge model -->
  <path class="arrow" d="M1000,446 L1000,482"/>
  <text x="1012" y="470" class="muted">judge call inside verify()</text>
  <rect x="800" y="486" width="400" height="70" rx="8" fill="#ffffff" stroke="#9a9891" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="816" y="510" class="boxT">judge MODEL SERVER</text>
  <text x="816" y="532" class="body">only if referenced by the verifier's config</text>
  <text x="804" y="600" class="muted">✗ no agent process     ✗ no policy model</text>

  <!-- artifacts band -->
  <rect x="40" y="864" width="700" height="106" rx="8" fill="#f4f3f0" stroke="#d8d6cf" stroke-width="1.5"/>
  <text x="56" y="888" class="lane">ARTIFACTS</text>
  <text x="56" y="914" class="body">reads (never modified):</text>
  <text x="230" y="914" class="monoS">rollouts_materialized_inputs.jsonl · rollouts.jsonl</text>
  <text x="56" y="944" class="body">writes:</text>
  <text x="230" y="944" class="monoS">output.jsonl · &lt;stem&gt;_aggregate_metrics.json</text>

  <!-- read/write arrows -->
  <path class="arrow" d="M560,862 L560,736"/>
  <text x="572" y="800" class="lbl">reads</text>
  <path class="arrow" d="M660,736 L660,862"/>
  <text x="672" y="800" class="lbl">writes</text>
  <path class="arrow" d="M230,818 L230,862"/>
</svg>
